<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Кабинет мастера</title>
<link rel="stylesheet" href="styles.css">
<style>
.dmn{display:none;background:var(--bg2);border-bottom:1px solid var(--bdr);overflow-x:auto;white-space:nowrap}
.dmn-i{display:inline-flex;align-items:center;gap:6px;padding:12px 14px;font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.dmn-i.on{color:var(--g);border-bottom-color:var(--g)}
.oc{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px;transition:.15s}
.oc:hover{border-color:var(--bdr2)}
.oc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.oc-title{font-size:15px;font-weight:800;color:#fff;margin-top:6px}
.oc-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--ink3);margin-bottom:10px;font-weight:600}
.oc-budget{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:var(--g);white-space:nowrap}
.oc-desc{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:12px}
.oc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.lock-box{background:var(--bg3);border:1px dashed var(--bdr2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--ink3);text-align:center;margin-top:10px}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:20px}
.sub-card{border-radius:16px;padding:26px;border:1px solid var(--bdr);background:var(--bg2);position:relative;transition:.2s}
.sub-card:hover{transform:translateY(-2px)}
.sub-card.ft{border-color:rgba(0,214,143,.3);background:linear-gradient(145deg,rgba(0,214,143,.06),var(--bg2))}
.sub-card.ft::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g),var(--acc));border-radius:16px 16px 0 0}
.sub-price{font-family:'Syne',sans-serif;font-size:34px;font-weight:900;color:#fff;letter-spacing:-.03em;margin:12px 0 4px;line-height:1}
.sub-price em{font-size:15px;color:var(--ink3);font-style:normal;font-family:'Manrope',sans-serif}
.sub-per{font-size:12px;color:var(--ink3);margin-bottom:16px;font-weight:600}
.sub-feats{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.sub-feat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2)}
.ck{color:var(--g);font-weight:900;font-size:11px;flex-shrink:0}
.xk{color:var(--ink4);font-size:12px;flex-shrink:0}
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.top-card{border-radius:14px;padding:22px;border:1px solid var(--bdr);background:var(--bg2);transition:.2s}
.top-card:hover{border-color:var(--yel)}
.top-price{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:var(--yel);margin:10px 0 14px}
.top-price span{font-size:12px;color:var(--ink3);font-family:'Manrope',sans-serif}
.bar-r{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-l{font-size:12px;color:var(--ink3);font-weight:600;width:90px;flex-shrink:0}
.bar-t{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-f{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),var(--acc));transition:.8s}
.bar-p{font-size:11px;font-weight:800;color:#fff;width:34px;text-align:right}
.ri{padding:14px 0;border-bottom:1px solid var(--bdr)}
.ri:last-child{border-bottom:none}
.ri-top{display:flex;justify-content:space-between;margin-bottom:5px}
.ri-name{font-size:13px;font-weight:800;color:#fff}
.ri-stars{color:var(--yel);font-size:12px}
.ri-date{font-size:11px;color:var(--ink3)}
.ri-text{font-size:12px;color:var(--ink3);line-height:1.6}
.skill-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:7px;background:var(--bg3);border:1px solid var(--bdr);font-size:12px;font-weight:600;color:var(--ink2);margin:3px}
.skill-tag .rm{color:var(--ink4);cursor:pointer;transition:.15s}
.skill-tag .rm:hover{color:var(--red)}
.vt-i{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.vt-i:last-child{border-bottom:none}
.vt-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:3px}
.vt-dot.done{background:var(--g)}.vt-dot.pend{background:var(--yel);animation:vpulse 1.5s infinite}
.vt-dot.wait{background:var(--bdr2)}
@keyframes vpulse{0%,100%{opacity:1}50%{opacity:.3}}
/* PAY MODAL */
.pay-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;padding:20px}
.pay-overlay.open{display:flex}
.pay-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:32px;max-width:440px;width:100%;position:relative}
.pay-method{padding:13px 16px;border-radius:11px;border:1.5px solid var(--bdr);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:.15s}
.pay-method:hover,.pay-method.on{border-color:var(--g)}
@media(max-width:1024px){.dmn{display:block}.top-grid{grid-template-columns:1fr}}
@media(max-width:640px){.sub-grid{grid-template-columns:1fr}}
</style>
</head>

<nav class="nav">
  <a href="index.html" class="nav-logo"><img src="logo.png" alt="Slavic Shkaf" class="nav-logo-img"></a>
  <ul class="nav-links"><li><a href="catalog.html">Каталог</a></li></ul>

<!-- Mobile tab bar -->

<div class="dash-wrap">
  <aside class="dash-side">
    <div class="dash-side-user" id="side-user"></div>
    <a class="ds-item active" data-tab="orders"    onclick="go('orders')">   <span class="ds-ico">📋</span><span id="si0"></span></a>
    <a class="ds-item"        data-tab="responses" onclick="go('responses')"><span class="ds-ico">🔔</span><span id="si1"></span></a>
    <a class="ds-item"        data-tab="chat"      onclick="go('chat')">     <span class="ds-ico">💬</span><span id="si2"></span></a>
    <a class="ds-item"        data-tab="stats"     onclick="go('stats')">    <span class="ds-ico">📊</span><span id="si3"></span></a>
    <div class="ds-sep"></div>
    <a class="ds-item"        data-tab="profile"   onclick="go('profile')">  <span class="ds-ico">👤</span><span id="si4"></span></a>
    <a class="ds-item"        data-tab="verif"     onclick="go('verif')">    <span class="ds-ico">✅</span><span id="si5"></span></a>
    <a class="ds-item"        data-tab="sub"       onclick="go('sub')">      <span class="ds-ico">⭐</span><span id="si6"></span></a>

  <main class="dash-main">
    <!-- ORDERS -->
    <div class="tab-panel active" id="tab-orders">
      <div class="d-head"><div class="d-title" id="tt0"></div>
        <div style="display:flex;gap:8px" id="ord-filter"></div></div>
      <div id="ord-list"></div>
    </div>
    <!-- RESPONSES -->
    <div class="tab-panel" id="tab-responses">
      <div class="d-head"><div class="d-title" id="tt1"></div></div>
      <div id="resp-list"></div>
    </div>
    <!-- CHAT -->
    <div class="tab-panel" id="tab-chat">
      <div class="d-head"><div class="d-title" id="tt2"></div></div>
      <div class="chat-layout">
        <div class="chat-list">
          <div class="chat-list-head" id="cl-h"></div>
          <div id="cl-items"></div>
        </div>
        <div class="chat-main" id="chat-main">
          <div class="chat-head" id="chat-hd" style="border-bottom:1px solid var(--bdr);padding:14px 18px">
            <div style="color:var(--ink3);font-size:13px;width:100%;text-align:center" id="chat-empty-msg"></div>
          </div>

      <div class="stats-grid" id="s-cards" style="margin-bottom:20px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="card card-p"><div class="card-t" id="s-ct"></div><div id="s-cats"></div></div>
        <div class="card card-p"><div class="card-t" id="s-rt"></div><div id="s-revs"></div></div>
      </div>
    </div>
    <!-- PROFILE -->
    <div class="tab-panel" id="tab-profile">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

          <div class="card-t" id="p-bt"></div>
          <div style="width:64px;height:64px;border-radius:14px;background:var(--gl);border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px" id="p-ava"></div>
          <div class="fg"><label class="fl" id="p-l0"></label><input class="fi" id="p-fn"></div>
          <div class="fg"><label class="fl" id="p-l1"></label><input class="fi" id="p-ln"></div>
          <div class="fg"><label class="fl" id="p-l2"></label><input class="fi" id="p-ph" type="tel"></div>
          <div class="fg"><label class="fl" id="p-l3"></label><input class="fi" id="p-tg" placeholder="@username"></div>
          <div class="fg"><label class="fl" id="p-l4"></label><select class="fi" id="p-co"></select></div>
          <div class="fg"><label class="fl" id="p-l5"></label><input class="fi" id="p-ci"></div>
        </div>
        <div>
          <div class="card card-p" style="margin-bottom:12px">
            <div class="card-t" id="p-at"></div>
            <textarea class="fi" id="p-about" rows="5" style="resize:vertical"></textarea>

          <div class="card card-p" style="margin-bottom:12px">

              <input class="fi" id="skill-inp" style="font-size:13px;padding:9px 12px">
              <button class="btn btn-ghost btn-sm" onclick="addSkill()" id="btn-add-sk"></button>
            </div>
          </div>
          <div class="card card-p">
            <div class="card-t" id="p-pt"></div>
            <div class="form-row">
              <div class="fg"><label class="fl" id="p-l6"></label><input class="fi" id="p-price" type="number"></div>
              <div class="fg"><label class="fl" id="p-l7"></label><input class="fi" id="p-exp" type="number"></div>

            <div class="fg"><label class="fl" id="p-l9"></label><input class="fi" id="p-pw2" type="password" placeholder="••••••••"></div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
const U = requireAuth('master'); if(!U) throw 0;
let curTab='orders', curChat=null, payData=null, skills=[];

// ── Tab ────────────────────────────────────────────────────
function go(tab){
  curTab=tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.ds-item[data-tab]').forEach(a=>a.classList.toggle('active',a.dataset.tab===tab));
  document.querySelectorAll('.dmn-i[data-tab]').forEach(a=>a.classList.toggle('on',a.dataset.tab===tab));
  const fn={orders:rOrders,responses:rResp,chat:rChat,stats:rStats,profile:rProfile,verif:rVerif,sub:rSub};
  if(fn[tab]) fn[tab]();
}

// ── ORDERS ─────────────────────────────────────────────────
function rOrders(){
  const ru=LANG==='ru';
  document.getElementById('tt0').textContent=t('orders');
  const all=getOrders().filter(o=>o.status==='open');
  const sub=hasSub(U);
  document.getElementById('ord-list').innerHTML=all.length?all.map(o=>{
    const done=o.responses&&o.responses.includes(U.id);
    return `<div class="oc">
      <div class="oc-top">
        <div>${statusBadge(o.status)}<div class="oc-title">${o.title}</div></div>
        <div class="oc-budget">${o.budget}${cfg.currency||'€'}</div>
      </div>
      <div class="oc-meta">
        <span>📍 ${o.city}, ${o.country}</span>
        <span>🔨 ${catIco(o.cat)} ${catName(o.cat)}</span>
        <span>👥 ${(o.responses||[]).length} ${ru?'откликов':'responses'}</span>
      </div>
      <div class="oc-desc">${o.desc}</div>
      ${!sub?`<div class="lock-box">🔒 ${ru?'Контакты скрыты — оформите подписку':'Contacts hidden — subscribe to unlock'}</div>`:''}
      <div class="oc-foot" style="margin-top:10px">
        <span></span>
        ${done?`<span class="badge badge-g">✅ ${ru?'Откликнулись':'Applied'}</span>`
              :`<button class="btn btn-p btn-sm" onclick="applyOrder(${o.id})">${t('apply')}</button>`}
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:60px;color:var(--ink3)"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:15px;font-weight:700">${ru?'Нет доступных заявок':'No orders available'}</div></div>`;
}

function applyOrder(id){
  const ru=LANG==='ru';
  if(!hasSub(U)){
    const lim=cfg.freeResponses||2;
    const used=getUsers().find(u=>u.id===U.id)?.monthlyResponses||0;
    if(used>=lim){toast(ru?`Лимит ${lim}/мес. Оформите подписку`:`Limit ${lim}/mo. Subscribe`,'warn');go('sub');return;}
  }
  const orders=getOrders(); const o=orders.find(x=>x.id===id); if(!o) return;
  if(!o.responses) o.responses=[];
  if(o.responses.includes(U.id)){toast(ru?'Уже откликнулись':'Already applied','warn');return;}
  o.responses.push(U.id);
  updateOrder(id,{responses:o.responses});
  updateUser(U.id,{monthlyResponses:(getUsers().find(u=>u.id===U.id)?.monthlyResponses||0)+1});
  toast(ru?'Отклик отправлен ✅':'Applied ✅');
  rOrders();
}

// ── RESPONSES ──────────────────────────────────────────────
function rResp(){
  const ru=LANG==='ru';
  document.getElementById('tt1').textContent=t('responses');
  const mine=getOrders().filter(o=>o.responses&&o.responses.includes(U.id));
  document.getElementById('resp-list').innerHTML=mine.length?mine.map(o=>`
    <div class="oc">
      <div class="oc-top">
        <div>${statusBadge(o.status)}<div class="oc-title">${o.title}</div></div>
        <div class="oc-budget">${o.budget}${cfg.currency||'€'}</div>
      </div>
      <div class="oc-meta"><span>📍 ${o.city}</span><span>📅 ${o.date}</span></div>
      <div class="oc-foot">
        ${o.chosenMaster===U.id
          ?`<span class="badge badge-g">🎉 ${ru?'Вас выбрали!':'You were chosen!'}</span><button class="btn btn-p btn-sm" onclick="go('chat')">${t('chat')}</button>`
          :o.status==='in_progress'
            ?`<span class="badge badge-muted">${ru?'Выбран другой мастер':'Another chosen'}</span>`
            :`<span class="badge badge-y">⏳ ${ru?'Ожидаем выбора':'Awaiting selection'}</span>`}
      </div>
    </div>`).join(''):`<div style="text-align:center;padding:60px;color:var(--ink3)"><div style="font-size:40px;margin-bottom:12px">🔔</div><div style="font-weight:700">${ru?'Нет откликов':'No responses'}</div></div>`;
}

// ── CHAT ───────────────────────────────────────────────────
function rChat(){
  const ru=LANG==='ru';
  document.getElementById('tt2').textContent=t('chat');
  document.getElementById('cl-h').textContent=ru?'Диалоги':'Conversations';
  document.getElementById('chat-empty-msg').textContent=ru?'Выберите диалог':'Select conversation';
  const chats=getChats();
  const orders=getOrders();
  document.getElementById('cl-items').innerHTML=chats.length?chats.map(c=>{
    const o=orders.find(x=>x.id===c.orderId);
    const last=c.messages[c.messages.length-1];
    return `<div class="chat-item${c.id===curChat?' active':''}" onclick="openChat('${c.id}')">
      <div class="ci-top"><div class="ci-name">${o?.clientName||'Клиент'}</div><div class="ci-time">${last?.ts||''}</div></div>
      <div class="ci-msg">${last?.text||'...'}</div>
    </div>`;
  }).join(''):`<div style="padding:24px;text-align:center;font-size:13px;color:var(--ink3)">${ru?'Нет диалогов':'No chats'}</div>`;
  if(curChat) openChat(curChat);
}
function openChat(id){
  curChat=id;
  const chats=getChats(); const c=chats.find(x=>x.id===id); if(!c) return;
  const o=getOrders().find(x=>x.id===c.orderId);
  const name=o?.clientName||'Клиент';
  document.getElementById('chat-hd').innerHTML=`<div class="chat-head-ava">${name[0]}</div><div><div class="chat-head-name">${name}</div><div style="font-size:11px;color:var(--g);font-weight:600">${o?.title||''}</div></div>`;
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML=c.messages.map(m=>`<div class="msg ${m.from==='master'?'me':'them'}"><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.ts}</div></div>`).join('');
  document.getElementById('chat-inp').style.display='flex';
  msgs.scrollTop=msgs.scrollHeight;
  document.querySelectorAll('.chat-item').forEach(el=>el.classList.toggle('active',el.onclick?.toString().includes(`'${id}'`)));
}
function sendMsg(){
  const ta=document.getElementById('chat-ta'); const txt=ta.value.trim(); if(!txt||!curChat) return;
  addMessage(curChat,{from:'master',text:txt}); ta.value=''; openChat(curChat);
}

// ── STATS ──────────────────────────────────────────────────
function rStats(){
  const ru=LANG==='ru';
  document.getElementById('tt3').textContent=t('statistics');
  const mine=getOrders().filter(o=>o.responses?.includes(U.id));
  const done=mine.filter(o=>o.status==='completed'&&o.chosenMaster===U.id);
  document.getElementById('s-cards').innerHTML=[
    {ico:'📋',v:mine.length,l:ru?'Откликов':'Responses'},
    {ico:'✅',v:done.length,l:ru?'Выполнено':'Completed'},
    {ico:'⭐',v:'4.9',l:t('review')},
    {ico:'💰',v:done.length*45+'€',l:ru?'Заработано':'Earned'},
  ].map(s=>`<div class="s-card"><div class="s-ico">${s.ico}</div><div class="s-val">${s.v}</div><div class="s-lbl">${s.l}</div></div>`).join('');
  document.getElementById('s-ct').textContent=ru?'ПО КАТЕГОРИЯМ':'BY CATEGORY';

// ── PROFILE ────────────────────────────────────────────────
function rProfile(){
  const ru=LANG==='ru';
  document.getElementById('tt4').textContent=t('profile');
  document.getElementById('btn-save').textContent=t('save');
  document.getElementById('p-bt').textContent=ru?'ОСНОВНЫЕ ДАННЫЕ':'BASIC INFO';
  document.getElementById('p-at').textContent=ru?'О СЕБЕ':'ABOUT';
  document.getElementById('p-st').textContent=ru?'НАВЫКИ':'SKILLS';
  document.getElementById('p-pt').textContent=ru?'ЦЕНА И ОПЫТ':'RATE & EXP';
  ['p-l0','p-l1','p-l2','p-l3','p-l4','p-l5'].forEach((id,i)=>{
    document.getElementById(id).textContent=[t('name'),t('surname'),t('phone'),t('telegram'),t('country'),t('city')][i];
  });
  ['p-l6','p-l7','p-l8','p-l9'].forEach((id,i)=>{
    document.getElementById(id).textContent=[ru?'Ставка €/ч':'Rate €/h',ru?'Опыт (лет)':'Experience (yr)',ru?'Новый пароль':'New Password',ru?'Подтвердить':'Confirm'][i];
  });
  document.getElementById('btn-add-sk').textContent=ru?'+ Добавить':'+ Add';
  document.getElementById('skill-inp').placeholder=ru?'Навык...':'Skill...';
  const me=getUsers().find(u=>u.id===U.id)||U;
  const np=me.name?.split(' ')||['',''];
  document.getElementById('p-ava').textContent=(me.name||'?')[0].toUpperCase();
  document.getElementById('p-fn').value=np[0]||'';
  document.getElementById('p-ln').value=np.slice(1).join(' ')||'';
  document.getElementById('p-ph').value=me.phone||'';
  document.getElementById('p-tg').value=me.telegram||'';
  document.getElementById('p-ci').value=me.city||'';
  document.getElementById('p-about').value=me.about||'';
  document.getElementById('p-price').value=me.price||45;
  document.getElementById('p-exp').value=me.experience||1;
  document.getElementById('p-co').innerHTML=`<option value="">${ru?'Страна':'Country'}</option>`+coOptions(me.country||'');
  skills=me.skills||[];
  rSkillTags();
}
function rSkillTags(){
  document.getElementById('skill-list').innerHTML=skills.map((s,i)=>`<span class="skill-tag">${s}<span class="rm" onclick="rmSkill(${i})">✕</span></span>`).join('');
}
function rmSkill(i){skills.splice(i,1);rSkillTags();}
function addSkill(){const v=document.getElementById('skill-inp').value.trim();if(!v)return;skills.push(v);document.getElementById('skill-inp').value='';rSkillTags();}
function saveProfile(){
  const pw=document.getElementById('p-pw').value;
  const pw2=document.getElementById('p-pw2').value;
  if(pw&&pw!==pw2){toast(LANG==='ru'?'Пароли не совпадают':'Passwords mismatch','err');return;}
  updateUser(U.id,{
    name:document.getElementById('p-fn').value.trim()+' '+document.getElementById('p-ln').value.trim(),
    phone:document.getElementById('p-ph').value,telegram:document.getElementById('p-tg').value,
    country:document.getElementById('p-co').value,city:document.getElementById('p-ci').value,
    about:document.getElementById('p-about').value,skills,
    price:document.getElementById('p-price').value,experience:document.getElementById('p-exp').value,
    ...(pw?{password:pw}:{})
  });
  toast(LANG==='ru'?'Сохранено ✅':'Saved ✅');
}

// ── PAY MODAL ──────────────────────────────────────────────
let payMethod='card';
function openPay(type,price,title){
  const ru=LANG==='ru';
  payData={type,price,title};
  document.getElementById('pm-t').textContent=title;
  document.getElementById('pm-s').textContent=`${price}€ — ${ru?'выберите способ оплаты':'select payment method'}`;
  document.getElementById('pm-methods').innerHTML=`
    <div class="pay-method on" id="pm-card" onclick="setPM('card',this)"><span style="font-size:20px">💳</span><div><div style="font-size:13px;font-weight:800;color:#fff">${ru?'Банковская карта':'Bank Card'}</div><div style="font-size:11px;color:var(--ink3)">Visa, Mastercard</div></div></div>
    <div class="pay-method" id="pm-tg" onclick="setPM('tg',this)"><span style="font-size:20px">✈️</span><div><div style="font-size:13px;font-weight:800;color:#fff">Telegram Pay</div><div style="font-size:11px;color:var(--ink3)">${ru?'Telegram кошелёк':'Telegram Wallet'}</div></div></div>`;
  document.getElementById('pm-btn').textContent=ru?`Оплатить ${price}€`:`Pay ${price}€`;
  document.getElementById('pm-note').textContent=ru?'🔒 Безопасная оплата. Отменить можно в любой момент.':'🔒 Secure payment. Cancel anytime.';
  document.getElementById('pay-overlay').classList.add('open');
}
function setPM(m,el){payMethod=m;document.querySelectorAll('.pay-method').forEach(e=>e.classList.remove('on'));el.classList.add('on');}
function closePay(){document.getElementById('pay-overlay').classList.remove('open');}
function doPay(){
  const ru=LANG==='ru'; const btn=document.getElementById('pm-btn');
  btn.disabled=true; btn.textContent=ru?'Обработка...':'Processing...';
  setTimeout(()=>{
    closePay();
    if(payData.type==='sub_monthly'){const e=new Date();e.setMonth(e.getMonth()+1);updateUser(U.id,{sub:true,subExpiry:e.toLocaleDateString('ru')});}
    else if(payData.type==='sub_yearly'){const e=new Date();e.setFullYear(e.getFullYear()+1);updateUser(U.id,{sub:true,subExpiry:e.toLocaleDateString('ru')});}
    else if(payData.type==='top_city') updateUser(U.id,{topCity:true});
    else if(payData.type==='top_country') updateUser(U.id,{topCountry:true});
    toast(ru?`Оплачено ${payData.price}€! 🎉`:`Paid ${payData.price}€! 🎉`);
    btn.disabled=false; rSub();
  },1500);
}
