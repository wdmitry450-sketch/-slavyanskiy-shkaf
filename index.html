<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Slavic Shkaf - Проверенные мастера</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  if(window.Telegram&&Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    Telegram.WebApp.setBackgroundColor('#06090f');
  }
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0d1117;--bg3:#111827;
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.12);
  --g:#00d68f;--gl:rgba(0,214,143,.08);
  --red:#ef4444;--yellow:#fbbf24;
  --ink1:#fff;--ink2:rgba(255,255,255,.7);--ink3:rgba(255,255,255,.4);
  --tg-safe-bottom:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:var(--ink1);font-family:'Manrope',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none}

/* ── NAVBAR ── */
.nav{height:60px;display:flex;align-items:center;padding:0 16px;gap:12px;
  background:rgba(6,9,15,.97);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:200;backdrop-filter:blur(16px)}
.nav-logo img{height:46px;object-fit:contain}
.nav-links{display:flex;gap:20px;list-style:none;margin-left:20px}
.nav-links a{color:var(--ink2);font-weight:600;font-size:13px;transition:.2s}
.nav-links a:hover{color:#fff}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-left{display:flex;align-items:center}
.nav-right{display:flex;align-items:center;gap:4px;position:relative}
.nav-menu-toggle{display:none;background:transparent;color:var(--ink2);font-size:20px;padding:4px;cursor:pointer}
.nav-right.mobile-menu-open .nav-menu-toggle{color:var(--g)}
.nav-right.mobile-menu-open .nav-dropdown{display:flex!important}
.nav-dropdown{display:none;position:absolute;top:100%;right:0;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:8px;flex-direction:column;gap:6px;min-width:140px;z-index:9}
.nav-btn-ghost{padding:6px 12px;border-radius:8px;border:1px solid var(--bdr2);color:var(--ink2);font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.nav-btn-ghost:hover{border-color:var(--g);color:#fff}
.nav-btn-cta{padding:6px 12px;border-radius:8px;background:var(--g);color:#000;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.nav-btn-cta:hover{background:#00c07e}
.lang-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--ink2);font-size:10px;font-weight:800;cursor:pointer;transition:.2s}
.lang-btn:hover{border-color:var(--g);color:#fff}
.user-name{color:var(--ink2);font-size:12px;font-weight:700}
.logout-btn{background:var(--g);color:#000;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.logout-btn:hover{background:#00c07e}

/* ── CONTENT ── */
.container{max-width:1200px;margin:0 auto;padding:60px 20px 40px}
.hero{text-align:center;padding:60px 20px}
.hero h1{font-size:clamp(28px,6vw,48px);font-weight:900;margin-bottom:16px;font-family:'Syne',sans-serif}
.hero p{color:var(--ink2);font-size:16px;margin-bottom:40px;line-height:1.6}
.cta-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:10px;font-weight:700;font-size:14px;transition:.2s;border:none;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--g);color:#000}
.btn-primary:hover{background:#00c07e;transform:translateY(-2px)}
.btn-secondary{background:transparent;border:1.5px solid var(--bdr2);color:#fff}
.btn-secondary:hover{border-color:var(--g);color:var(--g)}

@media(max-width:640px){
  .nav{height:54px;padding:0 10px}
  .nav-logo img{height:36px}
  .nav-links{display:none}
  .nav-menu-toggle{display:inline-flex}
  .container{padding:50px 12px 40px}
  .hero{padding:40px 16px}
  .hero h1{font-size:24px}
  .cta-buttons{flex-direction:column}
  .btn{width:100%}
}
</style>
<script src="config.js"></script>
<script src="storage.js"></script>
<script src="utils.js"></script>
<script src="api.js"></script>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAABDCAYAAADmJ0sKAAAA40lEQVR42u3VQQrCQBCF4SlIb3oQUcR78JL4Ao/iS5iTt9Ky0E2tba1Op+djevOB71EHfPh+s7rdbmeM0Wq1Bvj7+/vgdr/fAQAAAAAAAAAAAAAAAAAAAACAf+/xeAC2bQPzPEOtVgtKpcR1XZimSalUIo7jBEVRBFVVBZZlQbPZhNPpBNvtFg6HA5TL5SCXyyGXywnZbBb2+z3s93soFApQLpehWCwKmUxGiGEY8ng8oFgsQj6fh0KhIIzjCE6nE9hsNrDZbGCxWMBut4PZbAbz+RzG4zFMuVwGtm2DYRigWq1CLBYD0zR/HgaDAazXa+jMZrOgXC5DPp8HmgZgAAAgBgAAAGgAAACABoD/s+Fw+HNZlsV13YdoNBoP1+v1Yd3tdpdz7kHKsrRbrZYjhHgdY3x+/gIKVYsQp8CiOgAAAABJRU5ErkJggg==" alt="Slavic Shkaf"></a>
  <ul class="nav-links">
    <li><a href="catalog.html">Каталог</a></li>
    <li><a href="#how">Как работает</a></li>
  </ul>
  <div id="nav-r" class="nav-r"></div>
</nav>

<div class="container">
  <div class="hero">
    <h1>Проверенные мастера<br>по всей Европе</h1>
    <p>Лицензия • Страховка • Гарантия — каждый мастер верифицирован</p>
    <div class="cta-buttons">
      <a href="register.html" class="btn btn-primary">👷 Я мастер</a>
      <a href="register.html" class="btn btn-secondary">👤 Ищу мастера</a>
    </div>
  </div>
</div>

<script>
const renderNav=()=>{
  const u=getUser();
  const nr=document.getElementById('nav-r');
  if(!nr) return;
  
  const lb=langBtn();
  let authHTML='';
  
  if(u){
    const dash=u.role==='master'?'dashboard.html':u.role==='admin'?'admin.html':'client.html';
    authHTML=`<span class="user-name">${u.name}</span>
      <a href="${dash}" class="nav-btn-ghost">👤</a>
      <button class="logout-btn" onclick="clearUser();location.href='index.html'">Выход</button>`;
  }else{
    authHTML=`<a href="login.html" class="nav-btn-ghost">🔓 Вход</a>
      <a href="register.html" class="nav-btn-cta">Рег.</a>`;
  }
  
  nr.innerHTML=`<div class="nav-left">${lb}</div><div class="nav-right"><button class="nav-menu-toggle" onclick="toggleNavMenu(this)">☰</button><div class="nav-dropdown">${authHTML}</div></div>`;
};

function toggleNavMenu(btn){
  const nr=btn.parentElement;
  nr.classList.toggle('mobile-menu-open');
}

document.querySelector('.nav').addEventListener('click',(e)=>{
  const nr=document.querySelector('#nav-r .nav-right');
  if(nr&&!nr.contains(e.target)&&nr.classList.contains('mobile-menu-open')){
    nr.classList.remove('mobile-menu-open');
  }
});

renderNav();
</script>
</body>
</html>
