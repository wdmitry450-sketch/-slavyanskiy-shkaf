<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Кабинет заказчика</title>
<link rel="stylesheet" href="styles.css">
<style>
.dmn{display:none;background:var(--bg2);border-bottom:1px solid var(--bdr);overflow-x:auto;white-space:nowrap}
.dmn-i{display:inline-flex;align-items:center;gap:6px;padding:12px 14px;font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.dmn-i.on{color:var(--g);border-bottom-color:var(--g)}
.oc{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px;transition:.15s}
.oc:hover{border-color:var(--bdr2)}
.oc-title{font-size:15px;font-weight:800;color:#fff;margin:6px 0}
.oc-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--ink3);margin-bottom:10px;font-weight:600}
.oc-budget{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:var(--g);white-space:nowrap}
.oc-desc{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:12px}
.resp-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.resp-item{background:var(--bg3);border:1px solid var(--bdr);border-radius:11px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.resp-ava{width:36px;height:36px;border-radius:50%;background:var(--gl);border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--g);flex-shrink:0}
.mcard-mini{display:flex;align-items:center;gap:10px}
.mcard-mini-name{font-size:13px;font-weight:800;color:#fff}
.mcard-mini-info{font-size:11px;color:var(--ink3)}
/* CREATE ORDER FORM */
.create-order-wrap{background:var(--bg2);border:1px solid var(--bdr);border-radius:18px;padding:32px;max-width:640px}
/* REVIEW MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:32px;max-width:440px;width:100%;position:relative}
.stars-pick{display:flex;gap:8px;margin-bottom:16px}
.star-btn{font-size:28px;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4}
.star-btn.on{filter:none;opacity:1;transform:scale(1.1)}
@media(max-width:1024px){.dmn{display:block}}
</style>
</head>
<body class="pt">

<nav class="nav">
  <a href="index.html" class="nav-logo"><img src="logo.png" alt="Slavic Shkaf" class="nav-logo-img"></a>
  <ul class="nav-links"><li><a href="catalog.html">Каталог</a></li></ul>
  <div id="nav-r"></div>
  <button class="nav-burger" id="nav-burger"><span></span><span></span><span></span></button>
</nav>
<div class="nav-mob" id="nav-mob"></div>
<div class="dmn" id="dmn"></div>

<div class="dash-wrap">
  <aside class="dash-side">
    <div class="dash-side-user" id="side-user"></div>
    <a class="ds-item active" data-tab="orders"  onclick="go('orders')"> <span class="ds-ico">📋</span><span id="si0"></span></a>
    <a class="ds-item"        data-tab="create"  onclick="go('create')"> <span class="ds-ico">➕</span><span id="si1"></span></a>
    <a class="ds-item"        data-tab="chat"    onclick="go('chat')">   <span class="ds-ico">💬</span><span id="si2"></span></a>
    <a class="ds-item"        data-tab="catalog" onclick="go('catalog')"><span class="ds-ico">🔍</span><span id="si3"></span></a>
    <div class="ds-sep"></div>
    <a class="ds-item"        data-tab="profile" onclick="go('profile')"><span class="ds-ico">👤</span><span id="si4"></span></a>
    <div class="ds-sep"></div>
    <a class="ds-item" onclick="doLogout()"><span class="ds-ico">🚪</span><span id="si5"></span></a>
  </aside>

  <main class="dash-main">
    <!-- MY ORDERS -->
    <div class="tab-panel active" id="tab-orders">
      <div class="d-head"><div class="d-title" id="tt0"></div>
        <button class="btn btn-p btn-sm" onclick="go('create')" id="btn-new"></button></div>
      <div id="ord-list"></div>
    </div>

    <!-- CREATE ORDER -->
    <div class="tab-panel" id="tab-create">
      <div class="d-head"><div class="d-title" id="tt1"></div></div>
      <div class="create-order-wrap">
        <div class="fg"><label class="fl" id="co-l0"></label><input class="fi" id="co-title" maxlength="100"></div>
        <div class="fg"><label class="fl" id="co-l1"></label><select class="fi" id="co-cat"></select></div>
        <div class="form-row">
          <div class="fg"><label class="fl" id="co-l2"></label><select class="fi" id="co-co"></select></div>
          <div class="fg"><label class="fl" id="co-l3"></label><input class="fi" id="co-ci"></div>
        </div>
        <div class="fg"><label class="fl" id="co-l4"></label><textarea class="fi" id="co-desc" rows="4" style="resize:vertical"></textarea></div>
        <div class="form-row">
          <div class="fg"><label class="fl" id="co-l5"></label><input class="fi" id="co-budget" type="number" min="1"></div>
          <div class="fg"><label class="fl" id="co-l6"></label><input class="fi" id="co-date" type="date"></div>
        </div>
        <div class="fg"><label class="fl" id="co-l7"></label><input class="fi" id="co-addr" placeholder="Rue de la Paix 10"></div>
        <div style="background:var(--bg3);border:1px solid var(--bdr);border-radius:12px;padding:14px;font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:16px" id="co-note"></div>
        <button class="btn btn-p" onclick="createOrder()" id="btn-co"></button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="tab-panel" id="tab-chat">
      <div class="d-head"><div class="d-title" id="tt2"></div></div>
      <div class="chat-layout">
        <div class="chat-list">
          <div class="chat-list-head" id="cl-h"></div>
          <div id="cl-items"></div>
        </div>
        <div class="chat-main">
          <div class="chat-head" id="chat-hd" style="border-bottom:1px solid var(--bdr);padding:14px 18px">
            <div style="color:var(--ink3);font-size:13px;width:100%;text-align:center" id="chat-empty-msg"></div>
          </div>
          <div class="chat-msgs" id="chat-msgs"></div>
          <div class="chat-input" id="chat-inp" style="display:none">
            <textarea class="fi" id="chat-ta" rows="1" style="resize:none"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
            <button class="chat-send" onclick="sendMsg()">↑</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CATALOG / FIND MASTER -->
    <div class="tab-panel" id="tab-catalog">
      <div class="d-head"><div class="d-title" id="tt3"></div></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
        <select class="fi" id="fc-cat" style="max-width:180px" onchange="rCatalog()"></select>
        <select class="fi" id="fc-co"  style="max-width:180px" onchange="rCatalog()"></select>
        <input  class="fi" id="fc-q"   style="max-width:200px" onkeyup="rCatalog()">
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px" id="cat-grid"></div>
    </div>

    <!-- PROFILE -->
    <div class="tab-panel" id="tab-profile">
      <div class="d-head"><div class="d-title" id="tt4"></div>
        <button class="btn btn-p btn-sm" onclick="saveProfile()" id="btn-save"></button></div>
      <div class="create-order-wrap">
        <div style="width:60px;height:60px;border-radius:14px;background:var(--gl);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px" id="p-ava"></div>
        <div class="form-row">
          <div class="fg"><label class="fl" id="p-l0"></label><input class="fi" id="p-fn"></div>
          <div class="fg"><label class="fl" id="p-l1"></label><input class="fi" id="p-ln"></div>
        </div>
        <div class="fg"><label class="fl" id="p-l2"></label><input class="fi" id="p-ph" type="tel"></div>
        <div class="fg"><label class="fl" id="p-l3"></label><input class="fi" id="p-tg" placeholder="@username"></div>
        <div class="form-row">
          <div class="fg"><label class="fl" id="p-l4"></label><select class="fi" id="p-co"></select></div>
          <div class="fg"><label class="fl" id="p-l5"></label><input class="fi" id="p-ci"></div>
        </div>
        <div class="ds-sep"></div>
        <div class="fg"><label class="fl" id="p-l6"></label><input class="fi" id="p-pw" type="password" placeholder="••••••••"></div>
        <div class="fg"><label class="fl" id="p-l7"></label><input class="fi" id="p-pw2" type="password" placeholder="••••••••"></div>
      </div>
    </div>
  </main>
</div>

<!-- REVIEW MODAL -->
<div class="overlay" id="rev-overlay">
  <div class="modal-box">
    <button onclick="closeRev()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:4px" id="rev-title"></div>
    <div style="font-size:13px;color:var(--ink3);margin-bottom:20px" id="rev-sub"></div>
    <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:8px" id="rev-st"></div>
    <div class="stars-pick" id="stars-pick"></div>
    <div class="fg"><label class="fl" id="rev-cl"></label><textarea class="fi" id="rev-text" rows="4" style="resize:none"></textarea></div>
    <button class="btn btn-p btn-fw" onclick="submitReview()" id="btn-rev"></button>
  </div>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
const U=requireAuth('client'); if(!U) throw 0;
let curTab='orders', curChat=null, revOrderId=null, selStars=5;

function go(tab){
  curTab=tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.ds-item[data-tab]').forEach(a=>a.classList.toggle('active',a.dataset.tab===tab));
  document.querySelectorAll('.dmn-i[data-tab]').forEach(a=>a.classList.toggle('on',a.dataset.tab===tab));
  const fn={orders:rOrders,create:rCreate,chat:rChat,catalog:rCatalog,profile:rProfile};
  if(fn[tab]) fn[tab]();
}

// ── MY ORDERS ──────────────────────────────────────────────
function rOrders(){
  const ru=LANG==='ru';
  document.getElementById('tt0').textContent=t('myOrders');
  document.getElementById('btn-new').textContent=ru?'+ Новая заявка':'+ New Order';
  const myOrders=getOrders().filter(o=>o.clientId===U.id||o.clientId==='c1'); // demo fallback
  document.getElementById('ord-list').innerHTML=myOrders.length?myOrders.map(o=>{
    const responses=MASTERS.filter(m=>o.responses&&o.responses.includes(m.id));
    return `<div class="oc">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
        <div>${statusBadge(o.status)}<div class="oc-title">${o.title}</div></div>
        <div class="oc-budget">${o.budget}${cfg.currency||'€'}</div>
      </div>
      <div class="oc-meta">
        <span>📍 ${o.city}, ${o.country}</span>
        <span>🔨 ${catIco(o.cat)} ${catName(o.cat)}</span>
        <span>📅 ${o.date}</span>
      </div>
      <div class="oc-desc">${o.desc}</div>
      ${responses.length?`
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:8px">${ru?`ОТКЛИКИ (${responses.length})`:`RESPONSES (${responses.length})`}</div>
        <div class="resp-list">
          ${responses.map(m=>`<div class="resp-item">
            <div class="mcard-mini">
              <div class="resp-ava">${m.a}</div>
              <div>
                <div class="mcard-mini-name">${m.nm} ${m.topCity||m.topCountry?'🏆':''}</div>
                <div class="mcard-mini-info">⭐ ${m.rate} · ${m.price}€/ч · ${m.city}</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${o.chosenMaster===m.id
                ?`<span class="badge badge-g">✅ ${ru?'Выбран':'Chosen'}</span>`
                :o.status==='open'
                  ?`<button class="btn btn-p btn-sm" onclick="chooseMaster(${o.id},${m.id})">${t('choose')}</button>`
                  :''}
              <button class="btn btn-ghost btn-sm" onclick="viewProfile(${m.id})">👤</button>
              <button class="btn btn-ghost btn-sm" onclick="openChatWith(${o.id},${m.id},'${m.nm}')">💬</button>
            </div>
          </div>`).join('')}
        </div>` : `<div style="font-size:12px;color:var(--ink3);padding:10px 0">${ru?'Пока нет откликов. Мастера получат уведомление.':'No responses yet. Masters will be notified.'}</div>`}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap">
        ${o.status==='open'?`<button class="btn btn-danger btn-sm" onclick="cancelOrder(${o.id})">${ru?'Отменить':'Cancel'}</button>`:''}
        ${o.status==='in_progress'?`<button class="btn btn-p btn-sm" onclick="completeOrder(${o.id})">${t('complete')} ✅</button>`:''}
        ${o.status==='completed'&&!o.reviewed?`<button class="btn btn-ghost btn-sm" onclick="openRev(${o.id})">${ru?'Оставить отзыв':'Leave Review'} ⭐</button>`:''}
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:60px;color:var(--ink3)">
    <div style="font-size:40px;margin-bottom:12px">📋</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:8px">${ru?'Нет заявок':'No orders yet'}</div>
    <button class="btn btn-p btn-sm" onclick="go('create')">${ru?'Создать заявку':'Create Order'}</button>
  </div>`;
}

function chooseMaster(orderId,masterId){
  const ru=LANG==='ru';
  updateOrder(orderId,{chosenMaster:masterId,status:'in_progress'});
  toast(ru?'Мастер выбран! Открыт чат. ✅':'Master chosen! Chat opened. ✅');
  rOrders();
}
function cancelOrder(id){updateOrder(id,{status:'cancelled'});toast(LANG==='ru'?'Заявка отменена':'Order cancelled','warn');rOrders();}
function completeOrder(id){updateOrder(id,{status:'completed'});toast(LANG==='ru'?'Заказ выполнен! Оставьте отзыв ⭐':'Order completed! Leave a review ⭐');rOrders();}
function viewProfile(id){location.href='profile.html?id='+id;}

// ── CREATE ORDER ───────────────────────────────────────────
function rCreate(){
  const ru=LANG==='ru';
  document.getElementById('tt1').textContent=ru?'Создать заявку':'Create Order';
  const labels=[ru?'Заголовок заявки':'Order title',ru?'Категория':'Category',ru?'Страна':'Country',ru?'Город':'City',ru?'Описание работ':'Description',ru?'Бюджет (€)':'Budget (€)',ru?'Желаемая дата':'Desired date',ru?'Адрес':'Address'];
  ['co-l0','co-l1','co-l2','co-l3','co-l4','co-l5','co-l6','co-l7'].forEach((id,i)=>{document.getElementById(id).textContent=labels[i];});
  document.getElementById('co-cat').innerHTML=catOptions('',false);
  document.getElementById('co-co').innerHTML=`<option value="">${ru?'Выберите страну':'Select country'}</option>`+coOptions('');
  document.getElementById('co-title').placeholder=ru?'Например: Замена труб в ванной':'E.g.: Pipe replacement in bathroom';
  document.getElementById('co-desc').placeholder=ru?'Опишите подробно что нужно сделать...':'Describe in detail what needs to be done...';
  document.getElementById('co-date').min=new Date().toISOString().split('T')[0];
  document.getElementById('co-note').innerHTML=`🔒 <strong>${ru?'Ваши контакты скрыты.':'Your contacts are hidden.'}</strong> ${ru?'Мастера видят только описание, город и бюджет. Контакты открываются только выбранному мастеру.':'Masters see only description, city and budget. Contacts are revealed only to the chosen master.'}`;
  document.getElementById('btn-co').textContent=ru?'Опубликовать заявку':'Publish Order';
}

function createOrder(){
  const ru=LANG==='ru';
  const title=document.getElementById('co-title').value.trim();
  const cat=document.getElementById('co-cat').value;
  const country=document.getElementById('co-co').value;
  const city=document.getElementById('co-ci').value.trim();
  const desc=document.getElementById('co-desc').value.trim();
  const budget=document.getElementById('co-budget').value;
  const date=document.getElementById('co-date').value;
  if(!title) return toast(ru?'Введите заголовок':'Enter title','err');
  if(!cat)   return toast(ru?'Выберите категорию':'Select category','err');
  if(!country||!city) return toast(ru?'Укажите страну и город':'Enter country and city','err');
  if(!desc)  return toast(ru?'Опишите работу':'Describe the work','err');
  if(!budget) return toast(ru?'Укажите бюджет':'Enter budget','err');
  const btn=document.getElementById('btn-co');
  btn.disabled=true; btn.textContent=ru?'Публикация...':'Publishing...';
  setTimeout(()=>{
    addOrder({clientId:U.id,clientName:U.name,title,cat,country,city,desc,budget:+budget,date:date||'по договорённости',status:'open',responses:[],chosenMaster:null,createdAt:new Date().toISOString()});
    toast(ru?'Заявка опубликована! 🎉':'Order published! 🎉');
    btn.disabled=false; btn.textContent=ru?'Опубликовать заявку':'Publish Order';
    go('orders');
  },900);
}

// ── CHAT ───────────────────────────────────────────────────
function rChat(){
  const ru=LANG==='ru';
  document.getElementById('tt2').textContent=t('chat');
  document.getElementById('cl-h').textContent=ru?'Диалоги':'Conversations';
  document.getElementById('chat-empty-msg').textContent=ru?'Выберите диалог':'Select conversation';
  const chats=getChats();
  const orders=getOrders();
  document.getElementById('cl-items').innerHTML=chats.length?chats.map(c=>{
    const o=orders.find(x=>x.id===c.orderId);
    const m=MASTERS.find(x=>x.id===c.masterId);
    const last=c.messages[c.messages.length-1];
    return `<div class="chat-item${c.id===curChat?' active':''}" onclick="openChat('${c.id}')">
      <div class="ci-top"><div class="ci-name">${m?.nm||'Мастер'}</div><div class="ci-time">${last?.ts||''}</div></div>
      <div class="ci-msg">${last?.text||'...'}</div>
    </div>`;
  }).join(''):`<div style="padding:24px;text-align:center;font-size:13px;color:var(--ink3)">${ru?'Нет диалогов':'No chats'}</div>`;
  if(curChat) openChat(curChat);
}
function openChatWith(orderId,masterId,masterName){
  const chatId=`ch_${orderId}_${masterId}`;
  const chats=getChats();
  if(!chats.find(c=>c.id===chatId)){
    const newChat={id:chatId,orderId,masterId,clientId:U.id,messages:[]};
    const arr=[...chats,newChat]; saveChats(arr);
  }
  curChat=chatId; go('chat');
}
function openChat(id){
  curChat=id;
  const chats=getChats(); const c=chats.find(x=>x.id===id); if(!c) return;
  const m=MASTERS.find(x=>x.id===c.masterId);
  const name=m?.nm||'Мастер';
  document.getElementById('chat-hd').innerHTML=`<div class="chat-head-ava">${name[0]}</div><div><div class="chat-head-name">${name}</div><div style="font-size:11px;color:var(--g);font-weight:600">⭐ ${m?.rate||''} · ${m?.city||''}</div></div>`;
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML=c.messages.map(msg=>`<div class="msg ${msg.from==='client'?'me':'them'}"><div class="msg-bubble">${msg.text}</div><div class="msg-time">${msg.ts}</div></div>`).join('');
  document.getElementById('chat-inp').style.display='flex';
  msgs.scrollTop=msgs.scrollHeight;
}
function sendMsg(){
  const ta=document.getElementById('chat-ta'); const txt=ta.value.trim(); if(!txt||!curChat) return;
  addMessage(curChat,{from:'client',text:txt}); ta.value=''; openChat(curChat);
}

// ── CATALOG (find master) ──────────────────────────────────
function rCatalog(){
  const ru=LANG==='ru';
  document.getElementById('tt3').textContent=ru?'Найти мастера':'Find Master';
  document.getElementById('fc-cat').innerHTML=catOptions(document.getElementById('fc-cat')?.value||'');
  document.getElementById('fc-co').innerHTML=`<option value="">${ru?'Все страны':'All countries'}</option>`+coOptions(document.getElementById('fc-co')?.value||'');
  if(!document.getElementById('fc-q').placeholder) document.getElementById('fc-q').placeholder=ru?'Поиск мастера...':'Search master...';
  const catF=document.getElementById('fc-cat').value;
  const coF=document.getElementById('fc-co').value;
  const q=(document.getElementById('fc-q').value||'').toLowerCase();
  let masters=sortedMasters(MASTERS,null,coF||null);
  if(catF) masters=masters.filter(m=>m.cats.includes(catF));
  if(coF)  masters=masters.filter(m=>m.country===coF);
  if(q)    masters=masters.filter(m=>m.nm.toLowerCase().includes(q)||m.city.toLowerCase().includes(q)||m.skills.some(s=>s.toLowerCase().includes(q)));
  document.getElementById('cat-grid').innerHTML=masters.length?masters.map(m=>masterCardHTML(m)).join(''):`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--ink3)"><div style="font-size:40px;margin-bottom:12px">🔍</div><div>${ru?'Мастера не найдены':'No masters found'}</div></div>`;
}

// ── PROFILE ────────────────────────────────────────────────
function rProfile(){
  const ru=LANG==='ru';
  document.getElementById('tt4').textContent=t('profile');
  document.getElementById('btn-save').textContent=t('save');
  const labels=[t('name'),t('surname'),t('phone'),t('telegram'),t('country'),t('city'),ru?'Новый пароль':'New Password',ru?'Подтвердить пароль':'Confirm Password'];
  ['p-l0','p-l1','p-l2','p-l3','p-l4','p-l5','p-l6','p-l7'].forEach((id,i)=>document.getElementById(id).textContent=labels[i]);
  const me=getUsers().find(u=>u.id===U.id)||U;
  const np=me.name?.split(' ')||['',''];
  document.getElementById('p-ava').textContent=(me.name||'?')[0].toUpperCase();
  document.getElementById('p-fn').value=np[0]||'';
  document.getElementById('p-ln').value=np.slice(1).join(' ')||'';
  document.getElementById('p-ph').value=me.phone||'';
  document.getElementById('p-tg').value=me.telegram||'';
  document.getElementById('p-ci').value=me.city||'';
  document.getElementById('p-co').innerHTML=`<option value="">${ru?'Страна':'Country'}</option>`+coOptions(me.country||'');
}
function saveProfile(){
  const pw=document.getElementById('p-pw').value;
  const pw2=document.getElementById('p-pw2').value;
  if(pw&&pw!==pw2){toast(LANG==='ru'?'Пароли не совпадают':'Passwords mismatch','err');return;}
  updateUser(U.id,{name:document.getElementById('p-fn').value.trim()+' '+document.getElementById('p-ln').value.trim(),phone:document.getElementById('p-ph').value,telegram:document.getElementById('p-tg').value,country:document.getElementById('p-co').value,city:document.getElementById('p-ci').value,...(pw?{password:pw}:{})});
  toast(LANG==='ru'?'Сохранено ✅':'Saved ✅');
}

// ── REVIEW ─────────────────────────────────────────────────
function openRev(orderId){
  const ru=LANG==='ru'; revOrderId=orderId; selStars=5;
  document.getElementById('rev-title').textContent=ru?'Оставить отзыв':'Leave Review';
  document.getElementById('rev-sub').textContent=ru?'Оцените работу мастера':'Rate the master\'s work';
  document.getElementById('rev-st').textContent=ru?'ОЦЕНКА':'RATING';
  document.getElementById('rev-cl').textContent=ru?'Комментарий':'Comment';
  document.getElementById('btn-rev').textContent=ru?'Опубликовать отзыв':'Publish Review';
  document.getElementById('rev-text').placeholder=ru?'Расскажите о работе мастера...':'Tell us about the master\'s work...';
  document.getElementById('stars-pick').innerHTML=[1,2,3,4,5].map(n=>`<span class="star-btn${n<=selStars?' on':''}" onclick="setStar(${n})">★</span>`).join('');
  document.getElementById('rev-overlay').classList.add('open');
}
function setStar(n){selStars=n;document.querySelectorAll('.star-btn').forEach((el,i)=>el.classList.toggle('on',i<n));}
function closeRev(){document.getElementById('rev-overlay').classList.remove('open');}
function submitReview(){
  const ru=LANG==='ru';
  const txt=document.getElementById('rev-text').value.trim();
  if(!txt) return toast(ru?'Напишите комментарий':'Write a comment','err');
  updateOrder(revOrderId,{reviewed:true,review:{stars:selStars,text:txt,author:U.name,date:new Date().toLocaleDateString('ru')}});
  closeRev();
  toast(ru?'Отзыв опубликован! Спасибо ⭐':'Review published! Thank you ⭐');
  rOrders();
}

// ── SIDEBAR ────────────────────────────────────────────────
function initSidebar(){
  const ru=LANG==='ru'; const me=getUsers().find(u=>u.id===U.id)||U;
  document.getElementById('side-user').innerHTML=`<div class="dash-side-ava" style="background:var(--accl);border:2px solid var(--acc)">${(me.name||'?')[0].toUpperCase()}</div><div class="dash-side-name">${me.name}</div><div class="dash-side-role" style="color:var(--acc)">${ru?'Заказчик':'Client'}</div>`;
  const labels=[t('myOrders'),ru?'Новая заявка':'New Order',t('chat'),ru?'Найти мастера':'Find Master',t('profile'),t('logout')];
  ['si0','si1','si2','si3','si4','si5'].forEach((id,i)=>document.getElementById(id).textContent=labels[i]);
  const tabs=[{id:'orders',ico:'📋'},{id:'create',ico:'➕'},{id:'chat',ico:'💬'},{id:'catalog',ico:'🔍'},{id:'profile',ico:'👤'}];
  document.getElementById('dmn').innerHTML=tabs.map(tb=>`<div class="dmn-i${tb.id===curTab?' on':''}" data-tab="${tb.id}" onclick="go('${tb.id}')">${tb.ico}</div>`).join('');
}

document.addEventListener('DOMContentLoaded',()=>{initNav();initSidebar();rOrders();});
</script>
