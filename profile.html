<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Профиль мастера</title>
<style>
/* ═══════════════════════════════════════════════════════════
   SLAVIC SHKAF — SHARED STYLES
   Подключается на каждой странице
═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #06090f;
  --bg2:  #0d1117;
  --bg3:  #131920;
  --card: #1a222d;
  --bdr:  rgba(255,255,255,.08);
  --bdr2: rgba(255,255,255,.15);
  --g:    #00d68f;
  --g2:   #00a96e;
  --gl:   rgba(0,214,143,.10);
  --gb:   rgba(0,214,143,.18);
  --acc:  #7c6fff;
  --accl: rgba(124,111,255,.12);
  --ink:  #fff;
  --ink2: rgba(255,255,255,.72);
  --ink3: rgba(255,255,255,.42);
  --ink4: rgba(255,255,255,.16);
  --red:  #ff4d4f;
  --yel:  #ffc53d;
}

html  { scroll-behavior: smooth; }
body  { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--ink);
        overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5; }
a     { text-decoration: none; color: inherit; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }
::-webkit-scrollbar       { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px; }

/* ── NAV ──────────────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; padding: 0 5%; height: 68px; gap: 16px;
  background: rgba(6,9,15,.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bdr);
}

/* Logo with real image */
.nav-logo { display: flex; align-items: center; flex-shrink: 0; }
.nav-logo-img {
  height: 44px;   /* высота в шапке */
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.5));
  transition: transform .2s, filter .2s;
}
.nav-logo:hover .nav-logo-img {
  transform: scale(1.04);
  filter: drop-shadow(0 4px 14px rgba(0,0,0,.6));
}

.nav-links          { display: flex; gap: 2px; margin: 0 auto; list-style: none; }
.nav-links a        { padding: 8px 14px; border-radius: 8px; font-size: 14px;
                      font-weight: 600; color: var(--ink3); transition: .15s; }
.nav-links a:hover,
.nav-links a.active { color: #fff; background: rgba(255,255,255,.06); }

#nav-r              { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.nav-btn-ghost      { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600;
                      color: var(--ink2); border: 1px solid var(--bdr); background: transparent;
                      cursor: pointer; transition: .15s; }
.nav-btn-ghost:hover{ border-color: var(--bdr2); color: #fff; }
.nav-btn-cta        { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 800;
                      background: var(--g); color: #000; border: none; cursor: pointer;
                      transition: .15s; }
.nav-btn-cta:hover  { background: var(--g2); }

.nav-user-btn            { display: flex; align-items: center; gap: 9px; }
.nav-ava                 { width: 34px; height: 34px; border-radius: 50%; background: var(--gl);
                           border: 2px solid var(--g); display: flex; align-items: center;
                           justify-content: center; font-size: 14px; font-weight: 900; color: var(--g); }
.nav-uname               { font-size: 14px; font-weight: 700; color: #fff; transition: .15s; }
.nav-user-btn:hover .nav-uname { color: var(--g); }

.nav-burger      { display: none; flex-direction: column; gap: 5px; cursor: pointer;
                   background: none; border: none; padding: 4px; margin-left: 4px; }
.nav-burger span { width: 22px; height: 2px; background: #fff; border-radius: 2px; display: block; }

.nav-mob       { display: none; position: fixed; inset: 68px 0 0;
                 background: rgba(6,9,15,.98); backdrop-filter: blur(16px);
                 border-top: 1px solid var(--bdr); padding: 20px 5%;
                 flex-direction: column; gap: 4px; z-index: 199; overflow-y: auto; }
.nav-mob.open  { display: flex; }
.nav-mob a     { padding: 13px 14px; border-radius: 10px; font-size: 16px;
                 font-weight: 600; color: var(--ink2); }
.nav-mob a:hover { color: #fff; background: rgba(255,255,255,.06); }

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn      { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            border-radius: 10px; font-weight: 700; cursor: pointer; transition: .15s;
            border: none; text-decoration: none; font-family: inherit; }
.btn-p    { background: var(--g);  color: #000; padding: 13px 22px; font-size: 15px; font-weight: 800; }
.btn-p:hover { background: var(--g2); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(0,214,143,.22); }
.btn-p:disabled { opacity: .4; pointer-events: none; }
.btn-o    { background: transparent; color: var(--ink2); padding: 10px 18px;
            font-size: 14px; border: 1px solid var(--bdr2); }
.btn-o:hover { border-color: var(--g); color: var(--g); }
.btn-ghost{ background: rgba(255,255,255,.06); color: var(--ink2); padding: 10px 18px;
            font-size: 14px; border: 1px solid var(--bdr); }
.btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }
.btn-tg   { background: var(--bg3); color: var(--ink2); padding: 11px 18px;
            font-size: 14px; border: 1px solid var(--bdr2); }
.btn-tg:hover { border-color: #2AABEE; color: #2AABEE; }
.btn-danger { background: rgba(255,77,79,.1); color: var(--red); padding: 10px 18px;
              font-size: 14px; border: 1px solid rgba(255,77,79,.2); }
.btn-danger:hover { background: rgba(255,77,79,.18); }
.btn-sm  { padding: 7px 13px !important; font-size: 13px !important; border-radius: 8px !important; }
.btn-lg  { padding: 15px 28px; font-size: 16px; border-radius: 12px; }
.btn-fw  { width: 100%; }

/* ── FORMS ────────────────────────────────────────────────── */
.fg  { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.fl  { font-size: 11px; font-weight: 800; text-transform: uppercase;
       letter-spacing: .7px; color: var(--ink3); }
.fi  { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--bdr2);
       background: var(--bg3); color: #fff; font-size: 14px; outline: none;
       transition: .2s; width: 100%; }
.fi:focus       { border-color: var(--g); box-shadow: 0 0 0 3px var(--gl); background: var(--bg2); }
.fi::placeholder{ color: var(--ink3); }
textarea.fi     { resize: vertical; min-height: 88px; }
.form-row       { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.or-div         { display: flex; align-items: center; gap: 10px; margin: 16px 0;
                  font-size: 11px; color: var(--ink3); font-weight: 800;
                  text-transform: uppercase; letter-spacing: .6px; }
.or-div::before,
.or-div::after  { content: ''; flex: 1; height: 1px; background: var(--bdr); }

/* ── BADGES ───────────────────────────────────────────────── */
.badge       { display: inline-flex; align-items: center; gap: 4px;
               padding: 4px 10px; border-radius: 50px; font-size: 11px;
               font-weight: 800; white-space: nowrap; }
.badge-g     { background: var(--gl);  color: var(--g);   border: 1px solid rgba(0,214,143,.2); }
.badge-acc   { background: var(--accl);color: var(--acc);  border: 1px solid rgba(124,111,255,.2); }
.badge-y     { background: rgba(255,197,61,.12); color: var(--yel); border: 1px solid rgba(255,197,61,.22); }
.badge-r     { background: rgba(255,77,79,.1);   color: var(--red); border: 1px solid rgba(255,77,79,.16); }
.badge-muted { background: rgba(255,255,255,.05); color: var(--ink3); border: 1px solid var(--bdr); }

/* ── CARD ─────────────────────────────────────────────────── */
.card      { background: var(--bg2); border-radius: 16px; border: 1px solid var(--bdr); transition: .2s; }
.card-p    { padding: 24px; }
.card:hover{ border-color: var(--bdr2); }
.card-t    { font-size: 13px; font-weight: 800; text-transform: uppercase;
             letter-spacing: .7px; color: var(--ink3); margin-bottom: 18px;
             padding-bottom: 12px; border-bottom: 1px solid var(--bdr); }

/* ── MASTER CARD ──────────────────────────────────────────── */
.mcard     { display: block; border-radius: 16px; overflow: hidden; background: var(--bg2);
             border: 1px solid var(--bdr); cursor: pointer; transition: .22s; }
.mcard:hover { border-color: var(--g); transform: translateY(-4px);
               box-shadow: 0 18px 50px rgba(0,214,143,.08); }
.mcard-top   { height: 108px; position: relative;
               background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
               display: flex; align-items: center; justify-content: center; }
.mcard-ava   { font-size: 46px; }
.mcard-online{ position: absolute; bottom: 10px; right: 10px; width: 10px; height: 10px;
               border-radius: 50%; background: var(--g); border: 2px solid var(--bg2);
               animation: onpulse 2s infinite; }
@keyframes onpulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,214,143,.4); }
  60%     { box-shadow: 0 0 0 5px rgba(0,214,143,0); }
}
.mcard-badge { position: absolute; top: 10px; right: 10px; }
.mcard-body  { padding: 16px; }
.mcard-name  { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.mcard-city  { font-size: 12px; color: var(--ink3); margin-bottom: 10px; font-weight: 600; }
.mcard-tags  { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.mcard-tag   { padding: 3px 9px; border-radius: 6px; background: rgba(255,255,255,.05);
               border: 1px solid var(--bdr); font-size: 11px; font-weight: 600; color: var(--ink3); }
.mcard-foot  { display: flex; align-items: center; justify-content: space-between;
               padding-top: 11px; border-top: 1px solid var(--bdr); }
.mcard-rate  { font-size: 12px; color: var(--ink3); font-weight: 600; }
.mcard-rate strong { color: #fff; }
.mcard-price { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 900; color: var(--g); }
.mcard-price span { font-size: 11px; color: var(--ink3); font-family: 'Manrope', sans-serif; font-weight: 500; }

/* ── LAYOUT ───────────────────────────────────────────────── */
.pt      { padding-top: 68px; }
.section { padding: 80px 5%; }
.wrap    { max-width: 1160px; margin: 0 auto; }
.slbl    { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
           color: var(--g); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.slbl::after { content: ''; width: 30px; height: 1px; background: var(--g); }
.sh2     { font-family: 'Syne', sans-serif; font-size: clamp(24px,3.5vw,42px); font-weight: 900;
           letter-spacing: -.03em; line-height: 1.1; color: #fff; margin-bottom: 12px; }
.sh2 .g  { color: var(--g); }
.sp      { font-size: 15px; color: var(--ink3); line-height: 1.7; font-weight: 500; max-width: 500px; }
.sec-head{ display: flex; align-items: flex-end; justify-content: space-between;
           margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
.see-all { font-size: 14px; font-weight: 700; color: var(--g); transition: .15s; }
.see-all:hover { color: #fff; }

/* ── DASHBOARD ────────────────────────────────────────────── */
.dash-wrap { display: flex; min-height: calc(100vh - 68px); }
.dash-side { width: 240px; background: var(--bg2); border-right: 1px solid var(--bdr);
             padding: 20px 0; flex-shrink: 0; position: sticky; top: 68px;
             height: calc(100vh - 68px); overflow-y: auto; }
.dash-side-user   { padding: 0 16px 16px; border-bottom: 1px solid var(--bdr); margin-bottom: 8px; }
.dash-side-ava    { width: 40px; height: 40px; border-radius: 11px; display: flex;
                    align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; }
.dash-side-name   { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.dash-side-role   { font-size: 11px; font-weight: 800; }
.ds-item  { display: flex; align-items: center; gap: 11px; padding: 11px 20px;
            font-size: 14px; font-weight: 600; color: var(--ink3);
            cursor: pointer; transition: .15s; text-decoration: none; }
.ds-item:hover  { color: #fff; background: rgba(255,255,255,.04); }
.ds-item.active { color: var(--g); background: var(--gl); }
.ds-ico   { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
.ds-sep   { height: 1px; background: var(--bdr); margin: 10px 14px; }
.dash-main{ flex: 1; padding: 32px; background: var(--bg); min-width: 0; }
.tab-panel        { display: none; }
.tab-panel.active { display: block; }
.d-head   { display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 14px; }
.d-title  { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 900;
            color: #fff; letter-spacing: -.02em; }

/* ── STAT CARDS ───────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr));
              gap: 14px; margin-bottom: 24px; }
.s-card { background: var(--bg2); border-radius: 14px; padding: 20px; border: 1px solid var(--bdr); }
.s-ico  { font-size: 22px; margin-bottom: 10px; }
.s-val  { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900;
          color: #fff; line-height: 1; letter-spacing: -.02em; }
.s-val em   { color: var(--g); font-style: normal; }
.s-lbl      { font-size: 12px; color: var(--ink3); font-weight: 700; margin-top: 5px; }
.s-delta    { font-size: 11px; font-weight: 800; margin-top: 6px; }
.up { color: #52c41a; } .dn { color: var(--red); }

/* ── TABLE ────────────────────────────────────────────────── */
.tbl-wrap{ overflow-x: auto; }
.tbl     { width: 100%; border-collapse: collapse; }
.tbl th  { padding: 10px 14px; font-size: 11px; font-weight: 800; text-transform: uppercase;
           letter-spacing: .7px; color: var(--ink3); border-bottom: 1px solid var(--bdr);
           text-align: left; white-space: nowrap; }
.tbl td  { padding: 13px 14px; font-size: 13px; color: var(--ink2);
           border-bottom: 1px solid var(--bdr); vertical-align: middle; }
.tbl tr:hover td      { background: rgba(255,255,255,.015); }
.tbl tr:last-child td { border-bottom: none; }

/* ── VERIFICATION TRACK ───────────────────────────────────── */
.vt-item      { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--bdr); }
.vt-item:last-child { border-bottom: none; }
.vt-left      { display: flex; flex-direction: column; align-items: center;
                width: 20px; flex-shrink: 0; margin-top: 3px; }
.vt-dot       { width: 14px; height: 14px; border-radius: 50%; background: var(--bdr2); flex-shrink: 0; }
.vt-dot.done  { background: var(--g); }
.vt-dot.pend  { background: var(--yel); animation: vpulse 1.5s infinite; }
@keyframes vpulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
.vt-line      { width: 2px; flex: 1; min-height: 16px; background: var(--bdr); margin-top: 3px; }
.vt-t         { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.vt-p         { font-size: 12px; color: var(--ink3); }

/* ── BAR CHART ────────────────────────────────────────────── */
.bar-row   { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.bar-lbl   { font-size: 13px; color: var(--ink3); font-weight: 600; width: 120px; flex-shrink: 0; }
.bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 4px; transition: .8s ease; }
.bar-pct   { font-size: 12px; font-weight: 800; color: #fff; width: 36px;
             text-align: right; flex-shrink: 0; }

/* ── REVEAL ───────────────────────────────────────────────── */
.rv     { opacity: 1; transform: translateY(0); transition: opacity .6s ease, transform .6s ease; }
.rv.vis { opacity: 1; transform: translateY(0); }
.js-ready .rv { opacity: 0; transform: translateY(20px); }
.js-ready .rv.vis { opacity: 1; transform: translateY(0); }

/* ── FOOTER ───────────────────────────────────────────────── */
footer  { background: var(--bg); border-top: 1px solid var(--bdr); padding: 52px 5% 28px; }
.f-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px;
          max-width: 1160px; margin: 0 auto 36px; }
.f-logo { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 900; color: #fff;
          display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.f-logo-img { height: 36px; width: auto; object-fit: contain;
              filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
.f-desc { font-size: 13px; color: var(--ink3); line-height: 1.65; max-width: 185px; font-weight: 500; }
.f-col h4   { font-size: 10px; font-weight: 800; color: var(--ink4); text-transform: uppercase;
              letter-spacing: 1px; margin-bottom: 14px; }
.f-col a    { display: block; font-size: 13px; color: var(--ink3); margin-bottom: 9px;
              transition: .15s; font-weight: 500; }
.f-col a:hover { color: #fff; }
.f-bot  { max-width: 1160px; margin: 0 auto; display: flex; justify-content: space-between;
          padding-top: 20px; border-top: 1px solid var(--bdr); font-size: 11px;
          color: var(--ink3); font-weight: 600; flex-wrap: wrap; gap: 8px; }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 1024px) {
  .nav-links, .nav-btn-ghost, .nav-btn-cta { display: none; }
  .nav-burger { display: flex !important; }
  .dash-side  { display: none; }
  .dash-wrap  { flex-direction: column; }
  .dash-main  { padding: 20px 16px; }
  .f-grid     { grid-template-columns: 1fr 1fr; gap: 28px; }
  .form-row   { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .section    { padding: 56px 5%; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .f-grid     { grid-template-columns: 1fr; }
  .sec-head   { flex-direction: column; align-items: flex-start; }
}

/* ── LANG BUTTON ──────────────────────────────────────────── */
.lang-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
  background: rgba(255,255,255,.06); border: 1px solid var(--bdr); color: var(--ink2);
  cursor: pointer; transition: .15s; flex-shrink: 0;
}
.lang-btn:hover { border-color: var(--bdr2); color: #fff; }

/* ── AUTH PAGES ───────────────────────────────────────────── */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center;
             padding: 20px; background: var(--bg); position: relative; overflow: hidden; }
.auth-wrap::before { content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(0,214,143,.06) 0%, transparent 65%),
              radial-gradient(ellipse 50% 40% at 70% 60%, rgba(124,111,255,.06) 0%, transparent 65%); }
.auth-card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: 22px;
             padding: 40px; width: 100%; max-width: 460px; position: relative; z-index: 1;
             box-shadow: 0 32px 80px rgba(0,0,0,.5); }
.auth-logo { display: flex; justify-content: center; margin-bottom: 28px; }
.auth-logo img { height: 52px; width: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,.5)); }
.auth-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 900; color: #fff;
              text-align: center; margin-bottom: 4px; letter-spacing: -.02em; }
.auth-sub { font-size: 13px; color: var(--ink3); text-align: center; margin-bottom: 28px; font-weight: 600; }
.auth-foot { font-size: 13px; color: var(--ink3); text-align: center; margin-top: 16px; font-weight: 600; }
.auth-foot a { color: var(--g); font-weight: 700; }
.auth-foot a:hover { color: #fff; }
.form-err { background: rgba(255,77,79,.1); border: 1px solid rgba(255,77,79,.2); border-radius: 10px;
            padding: 11px 14px; font-size: 13px; color: var(--red); margin-bottom: 14px; display: none; }
.demo-hint { background: var(--gl); border: 1px solid rgba(0,214,143,.2); border-radius: 10px;
             padding: 12px 14px; margin-bottom: 20px; font-size: 12px; color: var(--ink2); line-height: 1.7; }
.demo-hint strong { color: var(--g); }
.auth-lang { position: absolute; top: 16px; right: 16px; }

/* ── REGISTER STEPS ───────────────────────────────────────── */
.step-bar { display: flex; gap: 6px; margin-bottom: 28px; }
.step-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--bdr2); transition: .3s; }
.step-dot.done { background: var(--g); }
.step-dot.active { background: var(--g); opacity: .5; }
.role-sel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
.role-opt { padding: 18px 14px; border-radius: 14px; border: 1.5px solid var(--bdr);
            background: var(--bg3); cursor: pointer; text-align: center; transition: .2s; }
.role-opt:hover { border-color: var(--bdr2); }
.role-opt.on { border-color: var(--g); background: var(--gl); }
.role-opt.on.cl { border-color: var(--acc); background: var(--accl); }
.ro-ico { font-size: 26px; margin-bottom: 8px; }
.ro-t { font-size: 14px; font-weight: 800; color: #fff; }
.ro-s { font-size: 11px; color: var(--ink3); margin-top: 3px; }
.cats-grid-sm { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin-top: 8px; }
.cat-opt { padding: 10px 8px; border-radius: 10px; background: var(--bg3); border: 1.5px solid var(--bdr);
           cursor: pointer; text-align: center; transition: .15s; font-size: 12px; font-weight: 700; color: var(--ink3); }
.cat-opt:hover { border-color: var(--bdr2); color: #fff; }
.cat-opt.on { border-color: var(--g); color: var(--g); background: var(--gl); }
.cat-opt-ico { font-size: 18px; display: block; margin-bottom: 4px; }
.upload-zone { border: 1.5px dashed var(--bdr2); border-radius: 12px; padding: 24px;
               text-align: center; cursor: pointer; transition: .2s; background: var(--bg3); }
.upload-zone:hover { border-color: var(--g); background: var(--gl); }
.upload-zone-ico { font-size: 28px; margin-bottom: 8px; }
.upload-zone-t { font-size: 13px; color: var(--ink3); font-weight: 600; }
.upload-done { border-color: var(--g); background: var(--gl); }
.upload-done .upload-zone-t { color: var(--g); }

/* ── STEP PANELS ──────────────────────────────────────────── */
.s-panel { display: none; }
.s-panel.active { display: block; }

/* ── TOP BADGE ────────────────────────────────────────────── */
.top-badge { background: linear-gradient(135deg, #f5a623, #f76b1c);
             color: #fff; padding: 3px 9px; border-radius: 50px;
             font-size: 10px; font-weight: 900; letter-spacing: .3px; }

/* ── LANG BTN ─────────────────────────────────────────────── */
.lang-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--ink3);transition:.15s;letter-spacing:.5px}
.lang-btn:hover{border-color:var(--g);color:var(--g)}

/* ── CHAT ─────────────────────────────────────────────────── */
.chat-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 68px - 64px);gap:0;border:1px solid var(--bdr);border-radius:16px;overflow:hidden;background:var(--bg2)}
.chat-list{border-right:1px solid var(--bdr);overflow-y:auto}
.chat-list-head{padding:16px;border-bottom:1px solid var(--bdr);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3)}
.chat-item{padding:14px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--bdr)}
.chat-item:hover{background:rgba(255,255,255,.03)}
.chat-item.active{background:var(--gl);border-left:3px solid var(--g)}
.ci-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ci-name{font-size:13px;font-weight:800;color:#fff}
.ci-time{font-size:10px;color:var(--ink3)}
.ci-msg{font-size:12px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-unread{background:var(--g);color:#000;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-main{display:flex;flex-direction:column}
.chat-head{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-head-ava{width:36px;height:36px;border-radius:50%;background:var(--gl);border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--g);flex-shrink:0}
.chat-head-name{font-size:14px;font-weight:800;color:#fff}
.chat-head-status{font-size:11px;color:var(--g);font-weight:600}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-empty{display:flex;align-items:center;justify-content:center;flex:1;font-size:14px;color:var(--ink3);text-align:center;padding:40px}
.msg{max-width:68%;word-break:break-word}
.msg.me{align-self:flex-end}
.msg.them{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;font-weight:500}
.msg.me   .msg-bubble{background:var(--g);color:#000;border-bottom-right-radius:4px}
.msg.them .msg-bubble{background:var(--bg3);color:#fff;border:1px solid var(--bdr);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--ink3);margin-top:4px;text-align:right}
.msg.them .msg-time{text-align:left}
.chat-input{padding:14px 16px;border-top:1px solid var(--bdr);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.chat-input textarea{flex:1;background:var(--bg3);border:1px solid var(--bdr2);border-radius:12px;padding:11px 14px;color:#fff;font-size:14px;resize:none;outline:none;font-family:inherit;max-height:100px;transition:.2s}
.chat-input textarea:focus{border-color:var(--g)}
.chat-send{width:42px;height:42px;border-radius:11px;background:var(--g);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chat-send:hover{background:var(--g2);transform:scale(1.05)}

/* ── SUBSCRIPTION CARDS ───────────────────────────────────── */
.sub-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.sub-card{border-radius:18px;padding:28px;border:1px solid var(--bdr);background:var(--bg2);position:relative;overflow:hidden;transition:.2s}
.sub-card:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.sub-card.featured{border-color:rgba(0,214,143,.3);background:linear-gradient(145deg,rgba(0,214,143,.06),var(--bg2))}
.sub-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g),var(--acc))}
.sub-badge{position:absolute;top:16px;right:16px}
.sub-price{font-family:'Syne',sans-serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1;margin:14px 0 4px}
.sub-price em{font-size:16px;color:var(--ink3);font-family:'Manrope',sans-serif;font-weight:500;font-style:normal}
.sub-period{font-size:12px;color:var(--ink3);margin-bottom:18px;font-weight:600}
.sub-feats{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.sub-feat{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink2);font-weight:500}
.sub-feat .ck{color:var(--g);font-weight:900;font-size:12px;flex-shrink:0}
.sub-feat .xk{color:var(--ink4);font-size:12px;flex-shrink:0}

/* ── TOP PURCHASE ─────────────────────────────────────────── */
.top-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.top-card{border-radius:16px;padding:24px;border:1px solid var(--bdr);background:var(--bg2);transition:.2s}
.top-card:hover{border-color:var(--yel);box-shadow:0 10px 30px rgba(255,197,61,.08)}
.top-card-ico{font-size:28px;margin-bottom:12px}
.top-card-t{font-family:'Syne',sans-serif;font-size:16px;font-weight:900;color:#fff;margin-bottom:6px}
.top-card-p{font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:16px}
.top-card-price{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;color:var(--yel);margin-bottom:14px}
.top-card-price span{font-size:12px;color:var(--ink3);font-family:'Manrope',sans-serif;font-weight:500}

/* ── ORDER CARD ───────────────────────────────────────────── */
.order-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px;transition:.15s}
.order-card:hover{border-color:var(--bdr2)}
.oc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.oc-title{font-size:15px;font-weight:800;color:#fff}
.oc-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--ink3);margin-bottom:10px;font-weight:600}
.oc-meta span{display:flex;align-items:center;gap:4px}
.oc-desc{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:12px}
.oc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.oc-budget{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:var(--g)}
.oc-contacts-blur{background:var(--bg3);border:1px dashed var(--bdr2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--ink3);text-align:center;margin-top:10px}
.oc-contacts-blur .lock{font-size:16px;display:block;margin-bottom:4px}

/* ── VERIF TRACK ──────────────────────────────────────────── */
.vt-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--bdr)}
.vt-item:last-child{border-bottom:none}
.vt-left{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0;margin-top:3px}
.vt-dot{width:14px;height:14px;border-radius:50%;background:var(--bdr2);flex-shrink:0}
.vt-dot.done{background:var(--g)}.vt-dot.pend{background:var(--yel);animation:vpulse 1.5s infinite}
@keyframes vpulse{0%,100%{opacity:1}50%{opacity:.4}}
.vt-line{width:2px;flex:1;min-height:14px;background:var(--bdr);margin-top:3px}
.vt-t{font-size:14px;font-weight:800;color:#fff;margin-bottom:2px}
.vt-p{font-size:12px;color:var(--ink3)}

/* ── PROFILE EDIT ─────────────────────────────────────────── */
.profile-ava-edit{position:relative;width:80px;margin-bottom:18px}
.profile-ava-big{width:80px;height:80px;border-radius:18px;background:var(--gl);border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer}
.profile-ava-btn{position:absolute;bottom:-4px;right:-4px;width:24px;height:24px;border-radius:50%;background:var(--g);border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:768px){
  .chat-layout{grid-template-columns:1fr;height:auto}
  .chat-list{display:none}.chat-list.show{display:block}
  .top-cards{grid-template-columns:1fr}
}

<script>
/* ═══════════════════════════════════════════════════════════
   SLAVIC SHKAF — SHARED UTILITIES v2
   Подключается на каждой странице ПОСЛЕ data.js
═══════════════════════════════════════════════════════════ */

// ── Lang ───────────────────────────────────────────────────
let LANG = localStorage.getItem('shkaf_lang') || 'ru';
const t = key => T[LANG][key] || T['ru'][key] || key;
const tl = obj => (typeof obj === 'string') ? obj : (obj[LANG] || obj['ru'] || '');
function setLang(l) { LANG = l; localStorage.setItem('shkaf_lang', l); location.reload(); }

// ── Settings (от админки) ──────────────────────────────────
function getSettings() {
  try { const s = JSON.parse(localStorage.getItem('shkaf_settings')); return s || DEFAULTS; }
  catch { return DEFAULTS; }
}
function saveSettings(s) { localStorage.setItem('shkaf_settings', JSON.stringify(s)); }
const cfg = getSettings();

// ── Auth / Session ─────────────────────────────────────────
const AUTH_KEY = 'shkaf_auth';
const USERS_KEY = 'shkaf_users';

function getUser()  { try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; } }
function setUser(u) { localStorage.setItem(AUTH_KEY, JSON.stringify(u)); }
function clearUser(){ localStorage.removeItem(AUTH_KEY); }

function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch { return []; } }
function saveUsers(arr) { localStorage.setItem(USERS_KEY, JSON.stringify(arr)); }

function registerUser(data) {
  const users = getUsers();
  if (users.find(u => u.email === data.email)) return { ok: false, err: LANG==='ru' ? 'Email уже зарегистрирован' : 'Email already registered' };
  const user = { ...data, id: 'u_' + Date.now(), createdAt: new Date().toISOString(),
    verified: false, verifLevel: 0, sub: false, subExpiry: null,
    topCity: false, topCountry: false, topCityExpiry: null, topCountryExpiry: null,
    responses: [], blocked: false };
  users.push(user);
  saveUsers(users);
  return { ok: true, user };
}

function loginUser(email, password) {
  // Admin hardcoded
  if (email === 'admin@slavic-shkaf.eu' && password === 'admin2025') {
    return { ok: true, user: { id:'admin', name:'Admin', role:'admin', email } };
  }
  const users = getUsers();
  const user = users.find(u => u.email === email && u.password === password);
  if (!user) return { ok: false, err: LANG==='ru' ? 'Неверный email или пароль' : 'Invalid email or password' };
  if (user.blocked) return { ok: false, err: LANG==='ru' ? 'Аккаунт заблокирован' : 'Account blocked' };
  return { ok: true, user };
}

function resetPassword(email, newPassword) {
  const users = getUsers();
  const idx = users.findIndex(u => u.email === email);
  if (idx === -1) return false;
  users[idx].password = newPassword;
  saveUsers(users);
  return true;
}

function updateUser(id, data) {
  const users = getUsers();
  const idx = users.findIndex(u => u.id === id);
  if (idx === -1) return false;
  users[idx] = { ...users[idx], ...data };
  saveUsers(users);
  // Update session
  const sess = getUser();
  if (sess && sess.id === id) setUser({ ...sess, ...data });
  return true;
}

function doLogout() {
  clearUser();
  toast(LANG==='ru' ? 'До встречи! 👋' : 'See you! 👋');
  setTimeout(() => location.href = 'index.html', 600);
}

// ── Orders ─────────────────────────────────────────────────
const ORDERS_KEY = 'shkaf_orders';
function getOrders()      { try { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || DEMO_ORDERS; } catch { return DEMO_ORDERS; } }
function saveOrders(arr)  { localStorage.setItem(ORDERS_KEY, JSON.stringify(arr)); }
function addOrder(o)      { const arr = getOrders(); arr.unshift({...o, id: Date.now()}); saveOrders(arr); }
function updateOrder(id, data) {
  const arr = getOrders();
  const i = arr.findIndex(o => o.id === id);
  if (i !== -1) { arr[i] = {...arr[i], ...data}; saveOrders(arr); }
}

// ── Chats ──────────────────────────────────────────────────
const CHATS_KEY = 'shkaf_chats';
function getChats()    { try { return JSON.parse(localStorage.getItem(CHATS_KEY)) || DEMO_CHATS; } catch { return DEMO_CHATS; } }
function saveChats(c)  { localStorage.setItem(CHATS_KEY, JSON.stringify(c)); }
function addMessage(chatId, msg) {
  const chats = getChats();
  const i = chats.findIndex(c => c.id === chatId);
  const message = {...msg, ts: new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})};
  if (i !== -1) { chats[i].messages.push(message); }
  else { chats.push({ id: chatId, messages: [message] }); }
  saveChats(chats);
}

// ── Toast ──────────────────────────────────────────────────
function toast(msg, type='ok') {
  let box = document.getElementById('_toast');
  if (!box) {
    box = document.createElement('div');
    box.id = '_toast';
    box.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
    document.body.appendChild(box);
  }
  const bg = type==='err' ? '#ff4d4f' : type==='warn' ? '#ffc53d' : '#00d68f';
  const co = type==='ok' ? '#000' : '#fff';
  const el = document.createElement('div');
  el.style.cssText = `padding:13px 20px;border-radius:11px;font-size:14px;font-weight:700;color:${co};background:${bg};box-shadow:0 8px 28px rgba(0,0,0,.4);animation:_tin .25s ease;max-width:300px`;
  el.textContent = msg;
  if (!document.getElementById('_tinkf')) {
    const s = document.createElement('style');
    s.id='_tinkf'; s.textContent='@keyframes _tin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(s);
  }
  box.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Helpers ────────────────────────────────────────────────
const cflag   = name => CO.find(c=>c.ru===name||c.en===name)?.f || '🌍';
const catName = id   => { const s=SK.find(s=>s.id===id); return s ? tl(s) : id; };

      <div class="mcard-name">${m.nm}</div>

      <div class="mcard-tags">${m.skills.slice(0,3).map(s=>`<span class="mcard-tag">${s}</span>`).join('')}</div>
      <div class="mcard-foot">
        <span class="mcard-rate"><strong>${m.rate}★</strong> <span>(${m.reviews})</span></span>
        <span class="mcard-price">${m.price}${cfg.currency || '€'}<span>/ч</span></span>
      </div>
    </div>
  </a>`;
}

// ── Nav ────────────────────────────────────────────────────
function initNav(activePage) {
  const u    = getUser();
  const navR = document.getElementById('nav-r');
  if (!navR) return;

  if (u) {
    let dash = 'client.html';
    if (u.role === 'master') dash = 'dashboard.html';
    if (u.role === 'admin')  dash = 'admin.html';
    navR.innerHTML = `
      <button class="lang-btn" onclick="setLang('${LANG==='ru'?'en':'ru'}')">${LANG==='ru'?'EN':'RU'}</button>
      <a href="${dash}" class="nav-user-btn">
        <div class="nav-ava">${u.name[0].toUpperCase()}</div>
        <span class="nav-uname">${u.name}</span>
      </a>
      <button class="nav-btn-ghost btn-sm" onclick="doLogout()">${t('logout')}</button>`;
  } else {
    navR.innerHTML = `
      <button class="lang-btn" onclick="setLang('${LANG==='ru'?'en':'ru'}')">${LANG==='ru'?'EN':'RU'}</button>
      <a href="login.html"    class="nav-btn-ghost">${t('login')}</a>
      <a href="register.html" class="nav-btn-cta">${t('register')}</a>`;
  }

  if (activePage) {
    document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
      a.classList.toggle('active', a.dataset.page === activePage);
    });
  }

  const burger = document.getElementById('nav-burger');
  const mob    = document.getElementById('nav-mob');
  if (burger && mob) {
    burger.style.display = 'flex';
    burger.addEventListener('click', () => mob.classList.toggle('open'));
  }
}

// ── Reveal ─────────────────────────────────────────────────
function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); obs.unobserve(e.target); }});
  }, { threshold: 0.08 });
  document.querySelectorAll('.rv').forEach(el => obs.observe(el));
}

// ── Auth guard ─────────────────────────────────────────────
function requireAuth(role) {
  const u = getUser();
  if (!u) { location.href = 'login.html'; return null; }
  if (role && u.role !== role && u.role !== 'admin') { location.href = 'index.html'; return null; }
  return u;
}

// ── Subscription check ─────────────────────────────────────
function hasSub(user) {
  if (!user) return false;
  if (user.sub && user.subExpiry) return new Date(user.subExpiry) > new Date();
  return user.sub === true; // demo
}

// ── Responses count this month ─────────────────────────────
function getMonthlyResponses(userId) {
  const orders = getOrders();
  const now = new Date();
  return orders.filter(o =>
    o.responses && o.responses.includes && o.responses.includes(userId) &&
    o.respondedAt && new Date(o.respondedAt).getMonth() === now.getMonth()
  ).length;
}

// ── Sorting masters (TOP first) ────────────────────────────
function sortedMasters(masters, city, country) {
  return [...masters].sort((a, b) => {
    const aTop = (city && a.city === city && a.topCity) ? 2 : (country && a.country === country && a.topCountry) ? 1 : 0;
    const bTop = (city && b.city === city && b.topCity) ? 2 : (country && b.country === country && b.topCountry) ? 1 : 0;
    if (bTop !== aTop) return bTop - aTop;
    return b.rate - a.rate;
  });
}

// ── Country/Cat select options ─────────────────────────────
function coOptions(sel) {
  return CO.map(c=>`<option value="${c.ru}"${c.ru===sel?' selected':''}>${c.f} ${tl(c)}</option>`).join('');
}
function catOptions(sel, all=true) {
  return (all ? `<option value="">${LANG==='ru'?'Все категории':'All categories'}</option>` : '') +
    SK.map(s=>`<option value="${s.id}"${s.id===sel?' selected':''}>${s.i} ${tl(s)}</option>`).join('');
}

// ── Status badge ───────────────────────────────────────────
function statusBadge(status) {
  const map = {
    open:       { cls:'badge-g', ru:'Открыта',      en:'Open'       },
    in_progress:{ cls:'badge-y', ru:'В работе',     en:'In Progress'},
    completed:  { cls:'badge-acc',ru:'Выполнено',   en:'Completed'  },
    cancelled:  { cls:'badge-r', ru:'Отменена',     en:'Cancelled'  },
    closed:     { cls:'badge-muted',ru:'Закрыта',   en:'Closed'     },
  };
  const s = map[status] || map.open;
  return `<span class="badge ${s.cls}">${LANG==='ru'?s.ru:s.en}</span>`;
}

</script>

    (m.sub?`<span class="badge badge-acc">⭐ Pro</span>`:'') +
    (m.online?`<span class="badge badge-g">${r?'Онлайн':'Online'}</span>`:`<span class="badge badge-muted">${r?'Офлайн':'Offline'}</span>`);

  document.getElementById('ph-meta').innerHTML = `

  const u=getUser();
  document.getElementById('ph-actions').innerHTML = u
    ? `<button class="btn btn-p" onclick="contactMaster()">${r?'Написать':'Message'} 💬</button>

  // Portfolio
  document.getElementById('sec-portfolio').textContent= r?'ПОРТФОЛИО':'PORTFOLIO';

  // Reviews
  document.getElementById('sec-reviews').textContent  = r?'ОТЗЫВЫ':'REVIEWS';
  document.getElementById('rate-big').textContent     = m.rate;
  document.getElementById('rate-stars').textContent   = '★'.repeat(Math.round(m.rate)) + '☆'.repeat(5-Math.round(m.rate));
  document.getElementById('rate-count').textContent   = `${m.reviews} ${r?'отзывов':'reviews'}`;
  document.getElementById('reviews-list').innerHTML   = (m.revList||[]).map(rv=>`
    <div class="review-card">
      <div class="rc-top"><div><div class="rc-author">${rv.author}</div><div class="rc-date">${rv.date}</div></div></div>
      <div class="rc-stars">${'★'.repeat(rv.stars)}</div>
      <div class="rc-text">${rv.text}</div>

  document.getElementById('btn-contact').onclick      = contactMaster;

function contactMaster(){
  const u=getUser();
  if(!u){location.href='register.html?role=client';return;}

  else toast(LANG==='ru'?'Откройте кабинет клиента для связи':'Open client dashboard to contact','warn');
}

document.addEventListener('DOMContentLoaded',()=>{initNav();render();initReveal();});
</script>
