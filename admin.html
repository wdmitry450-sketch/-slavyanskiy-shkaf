<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Админ панель</title>
<link rel="stylesheet" href="styles.css">
<style>
body{overflow-x:hidden}
.admin-wrap{display:grid;grid-template-columns:240px 1fr;min-height:100vh;padding-top:68px}
.admin-side{background:var(--bg2);border-right:1px solid var(--bdr);padding:24px 0;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto}
.as-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--red);padding:0 20px;margin-bottom:12px}
.as-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;transition:.15s;border-left:3px solid transparent}
.as-item:hover{background:rgba(255,255,255,.03);color:#fff}
.as-item.on{background:rgba(255,59,59,.06);border-left-color:var(--red);color:#fff}
.as-ico{font-size:15px;flex-shrink:0}
.as-sep{height:1px;background:var(--bdr);margin:10px 20px}
.admin-main{padding:28px;overflow-y:auto}
.a-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.a-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-.02em}
.a-tab{display:none}.a-tab.on{display:block}
/* Stats cards */
.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.adm-s{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px}
.adm-s-ico{font-size:22px;margin-bottom:10px}
.adm-s-v{font-family:'Syne',sans-serif;font-size:28px;font-weight:900;color:#fff;letter-spacing:-.03em}
.adm-s-l{font-size:12px;color:var(--ink3);font-weight:600;margin-top:3px}
.adm-s-d{font-size:11px;margin-top:4px;font-weight:700}
.adm-s-d.up{color:var(--g)}.adm-s-d.warn{color:var(--yel)}
/* Table */
.adm-tbl{width:100%;border-collapse:collapse;font-size:13px}
.adm-tbl th{padding:10px 12px;text-align:left;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);border-bottom:1px solid var(--bdr)}
.adm-tbl td{padding:12px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.adm-tbl tr:last-child td{border-bottom:none}
.adm-tbl tr:hover td{background:rgba(255,255,255,.02)}
.adm-ava{width:32px;height:32px;border-radius:50%;background:var(--gl);border:2px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--g);flex-shrink:0}
.adm-ava.cl{background:var(--accl);border-color:var(--acc);color:var(--acc)}
.user-cell{display:flex;align-items:center;gap:10px}
.user-nm{font-weight:800;color:#fff;font-size:13px}
.user-em{font-size:11px;color:var(--ink3)}
.act-btns{display:flex;gap:6px;flex-wrap:wrap}
/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.setting-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:22px}
.setting-t{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--red);margin-bottom:16px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);gap:12px}
.setting-row:last-child{border-bottom:none}
.setting-k{font-size:13px;color:var(--ink2);font-weight:600;flex:1}
.setting-inp{width:90px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:7px 10px;color:#fff;font-size:13px;font-weight:700;text-align:right;outline:none;transition:.2s;font-family:'Syne',sans-serif}
.setting-inp:focus{border-color:var(--g)}
/* TOP manager */
.top-mgr{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:20px;margin-bottom:16px}
.top-mgr-t{font-size:13px;font-weight:900;color:#fff;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.top-list{display:flex;flex-direction:column;gap:8px}
.top-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--bdr)}
.top-row-l{display:flex;align-items:center;gap:10px}
.top-row-name{font-size:13px;font-weight:800;color:#fff}
.top-row-sub{font-size:11px;color:var(--ink3)}
.top-slot{font-size:11px;font-weight:800;color:var(--yel);padding:3px 8px;background:rgba(255,197,61,.1);border:1px solid rgba(255,197,61,.2);border-radius:5px}
/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-sl{position:absolute;cursor:pointer;inset:0;background:var(--bg3);border:1px solid var(--bdr2);border-radius:50px;transition:.2s}
.toggle-sl::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--ink3);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-sl{background:var(--g);border-color:var(--g)}
.toggle input:checked+.toggle-sl::before{transform:translateX(20px);background:#000}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:32px;max-width:500px;width:100%;position:relative;max-height:90vh;overflow-y:auto}
/* Log */
.log-item{padding:10px 0;border-bottom:1px solid var(--bdr);display:flex;gap:12px;align-items:flex-start}
.log-item:last-child{border-bottom:none}
.log-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.log-t{font-size:13px;color:#fff;font-weight:600}
.log-s{font-size:11px;color:var(--ink3)}
@media(max-width:1024px){.admin-wrap{grid-template-columns:1fr}.admin-side{display:none}.adm-stats{grid-template-columns:1fr 1fr}.settings-grid{grid-template-columns:1fr}}
@media(max-width:640px){.adm-stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body class="pt">

<nav class="nav">
  <a href="index.html" class="nav-logo"><img src="logo.png" alt="Slavic Shkaf" class="nav-logo-img"></a>
  <ul class="nav-links"><li><a href="catalog.html">Каталог</a></li></ul>
  <div id="nav-r"></div>
</nav>

<div class="admin-wrap">
  <!-- SIDEBAR -->
  <aside class="admin-side">
    <div style="padding:0 20px 14px;border-bottom:1px solid var(--bdr);margin-bottom:14px">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:900;color:var(--red)">🛡️ ADMIN PANEL</div>
      <div style="font-size:11px;color:var(--ink3);margin-top:3px" id="admin-email"></div>
    </div>
    <div class="as-title">ОСНОВНОЕ</div>
    <div class="as-item on" data-tab="overview" onclick="go('overview')"><span class="as-ico">📊</span><span id="am0"></span></div>
    <div class="as-item" data-tab="masters"  onclick="go('masters')"> <span class="as-ico">👷</span><span id="am1"></span></div>
    <div class="as-item" data-tab="clients"  onclick="go('clients')"> <span class="as-ico">👤</span><span id="am2"></span></div>
    <div class="as-item" data-tab="orders"   onclick="go('orders')">  <span class="as-ico">📋</span><span id="am3"></span></div>
    <div class="as-sep"></div>
    <div class="as-title">МОНЕТИЗАЦИЯ</div>
    <div class="as-item" data-tab="subs"     onclick="go('subs')">    <span class="as-ico">💳</span><span id="am4"></span></div>
    <div class="as-item" data-tab="top"      onclick="go('top')">     <span class="as-ico">🏆</span><span id="am5"></span></div>
    <div class="as-sep"></div>
    <div class="as-title">СИСТЕМА</div>
    <div class="as-item" data-tab="settings" onclick="go('settings')"><span class="as-ico">⚙️</span><span id="am6"></span></div>
    <div class="as-item" data-tab="log"      onclick="go('log')">     <span class="as-ico">📝</span><span id="am7"></span></div>
    <div class="as-sep"></div>
    <div class="as-item" onclick="doLogout()"><span class="as-ico">🚪</span><span id="am8"></span></div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">

    <!-- ══ OVERVIEW ══════════════════════════════════════════ -->
    <div class="a-tab on" id="tab-overview">
      <div class="a-head"><div class="a-title" id="ov-t"></div>
        <div style="font-size:12px;color:var(--ink3)" id="ov-date"></div></div>
      <div class="adm-stats" id="ov-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="setting-card">
          <div class="setting-t" id="ov-new-t"></div>
          <div id="ov-new-list"></div>
        </div>
        <div class="setting-card">
          <div class="setting-t" id="ov-act-t"></div>
          <div id="ov-act-list"></div>
        </div>
      </div>
    </div>

    <!-- ══ MASTERS ════════════════════════════════════════════ -->
    <div class="a-tab" id="tab-masters">
      <div class="a-head">
        <div class="a-title" id="ms-t"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="fi" id="ms-q" style="max-width:200px;font-size:13px;padding:9px 12px" onkeyup="renderMasters()">
          <select class="fi" id="ms-filter" style="max-width:160px;font-size:13px;padding:9px 12px" onchange="renderMasters()">
            <option value="">Все</option>
            <option value="pending">На верификации</option>
            <option value="verified">Верифицирован</option>
            <option value="sub">С подпиской</option>
            <option value="top">В ТОПе</option>
            <option value="blocked">Заблокированы</option>
          </select>
        </div>
      </div>
      <div class="card card-p" style="overflow-x:auto">
        <table class="adm-tbl" id="masters-tbl"></table>
      </div>
    </div>

    <!-- ══ CLIENTS ════════════════════════════════════════════ -->
    <div class="a-tab" id="tab-clients">
      <div class="a-head"><div class="a-title" id="cl-t"></div>
        <input class="fi" id="cl-q" style="max-width:220px;font-size:13px;padding:9px 12px" onkeyup="renderClients()"></div>
      <div class="card card-p" style="overflow-x:auto">
        <table class="adm-tbl" id="clients-tbl"></table>
      </div>
    </div>

    <!-- ══ ORDERS ═════════════════════════════════════════════ -->
    <div class="a-tab" id="tab-orders">
      <div class="a-head"><div class="a-title" id="or-t"></div>
        <select class="fi" id="or-filter" style="max-width:160px;font-size:13px;padding:9px 12px" onchange="renderOrders()">
          <option value="">Все статусы</option>
          <option value="open">Открыта</option>
          <option value="in_progress">В работе</option>
          <option value="completed">Выполнено</option>
          <option value="cancelled">Отменена</option>
        </select>
      </div>
      <div class="card card-p" style="overflow-x:auto">
        <table class="adm-tbl" id="orders-tbl"></table>
      </div>
    </div>

    <!-- ══ SUBSCRIPTIONS ═════════════════════════════════════ -->
    <div class="a-tab" id="tab-subs">
      <div class="a-head"><div class="a-title" id="sb-t"></div></div>
      <div class="adm-stats" style="grid-template-columns:repeat(3,1fr)" id="sub-stats"></div>
      <div class="card card-p" style="overflow-x:auto">
        <table class="adm-tbl" id="subs-tbl"></table>
      </div>
    </div>

    <!-- ══ TOP MANAGER ════════════════════════════════════════ -->
    <div class="a-tab" id="tab-top">
      <div class="a-head"><div class="a-title" id="tp-t"></div>
        <button class="btn btn-p btn-sm" onclick="openAddTop()">+ Добавить в ТОП</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--yel);margin-bottom:12px" id="tp-city-t"></div>
          <div id="top-city-list"></div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--yel);margin-bottom:12px" id="tp-country-t"></div>
          <div id="top-country-list"></div>
        </div>
      </div>
    </div>

    <!-- ══ SETTINGS ══════════════════════════════════════════ -->
    <div class="a-tab" id="tab-settings">
      <div class="a-head">
        <div class="a-title" id="st-t"></div>
        <button class="btn btn-p btn-sm" onclick="saveSettings2()" id="btn-save-set"></button>
      </div>
      <div class="settings-grid" id="settings-grid"></div>
    </div>

    <!-- ══ LOG ═══════════════════════════════════════════════ -->
    <div class="a-tab" id="tab-log">
      <div class="a-head">
        <div class="a-title" id="lg-t"></div>
        <button class="btn btn-danger btn-sm" onclick="clearLog()">🗑 Очистить</button>
      </div>
      <div class="card card-p">
        <div id="log-list"></div>
      </div>
    </div>

  </main>
</div>

<!-- MASTER DETAIL MODAL -->
<div class="overlay" id="master-modal">
  <div class="modal-box">
    <button onclick="closeModal('master-modal')" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:4px" id="mm-name"></div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:20px" id="mm-sub"></div>
    <div id="mm-body"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px" id="mm-actions"></div>
  </div>
</div>

<!-- ADD TO TOP MODAL -->
<div class="overlay" id="top-modal">
  <div class="modal-box">
    <button onclick="closeModal('top-modal')" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:18px">🏆 Добавить в ТОП</div>
    <div class="fg"><label class="fl">Выберите мастера</label>
      <select class="fi" id="top-sel-master"></select></div>
    <div class="fg"><label class="fl">Тип ТОПа</label>
      <select class="fi" id="top-sel-type">
        <option value="city">ТОП в городе</option>
        <option value="country">ТОП в стране</option>
        <option value="both">Оба</option>
      </select></div>
    <div class="fg"><label class="fl">Срок (месяцев)</label>
      <input class="fi" id="top-months" type="number" value="1" min="1" max="12"></div>
    <button class="btn btn-p btn-fw" onclick="addToTop()">Добавить в ТОП</button>
  </div>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
// ── Admin guard ────────────────────────────────────────────
const U = getUser();
if (!U || U.role !== 'admin') { location.href = 'login.html'; throw 0; }
document.getElementById('admin-email').textContent = U.email;

let curTab = 'overview';
let editSettings = {};

// ── Log system ─────────────────────────────────────────────
const LOG_KEY = 'shkaf_admin_log';
function getLogs()    { try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch { return []; } }
function addLog(ico, t, s) {
  const logs = getLogs();
  logs.unshift({ ico, t, s, ts: new Date().toLocaleString('ru') });
  localStorage.setItem(LOG_KEY, JSON.stringify(logs.slice(0, 200)));
}
function clearLog()   { localStorage.removeItem(LOG_KEY); renderLog(); toast('Лог очищен'); }

// ── Tab switch ─────────────────────────────────────────────
function go(tab) {
  curTab = tab;
  document.querySelectorAll('.a-tab').forEach(p => p.classList.remove('on'));
  document.getElementById('tab-' + tab).classList.add('on');
  document.querySelectorAll('.as-item[data-tab]').forEach(a => a.classList.toggle('on', a.dataset.tab === tab));
  const fn = { overview: rOverview, masters: renderMasters, clients: renderClients, orders: renderOrders, subs: renderSubs, top: renderTop, settings: renderSettings, log: renderLog };
  if (fn[tab]) fn[tab]();
}

// ── OVERVIEW ───────────────────────────────────────────────
function rOverview() {
  document.getElementById('ov-t').textContent = 'Обзор';
  document.getElementById('ov-date').textContent = new Date().toLocaleDateString('ru', { weekday:'long', day:'numeric', month:'long' });
  const users   = getUsers();
  const masters = users.filter(u => u.role === 'master');
  const clients = users.filter(u => u.role === 'client');
  const orders  = getOrders();
  const subs    = masters.filter(m => hasSub(m));
  const pending = masters.filter(m => m.verifStatus === 'pending');

  document.getElementById('ov-stats').innerHTML = [
    { ico:'👷', v:masters.length, l:'Мастеров', d:'+' + Math.floor(masters.length * .1) + ' за месяц', cls:'up' },
    { ico:'👤', v:clients.length, l:'Заказчиков', d:'+' + Math.floor(clients.length * .15) + ' за месяц', cls:'up' },
    { ico:'📋', v:orders.length,  l:'Заявок всего', d:orders.filter(o=>o.status==='open').length + ' открыто', cls:'up' },
    { ico:'💳', v:subs.length,    l:'Активных подписок', d:pending.length + ' на верификации', cls: pending.length ? 'warn' : 'up' },
  ].map(s => `<div class="adm-s"><div class="adm-s-ico">${s.ico}</div><div class="adm-s-v">${s.v}</div><div class="adm-s-l">${s.l}</div><div class="adm-s-d ${s.cls}">${s.d}</div></div>`).join('');

  document.getElementById('ov-new-t').textContent  = 'НОВЫЕ НА ВЕРИФИКАЦИИ';
  document.getElementById('ov-act-t').textContent  = 'ПОСЛЕДНИЕ ЗАЯВКИ';

  const pend = masters.filter(m => m.verifStatus === 'pending');
  document.getElementById('ov-new-list').innerHTML = pend.length
    ? pend.slice(0, 5).map(m => `<div class="log-item">
        <div class="log-ico">👷</div>
        <div><div class="log-t">${m.name}</div><div class="log-s">${m.email} · ${m.city || '—'}</div></div>
        <button class="btn btn-p btn-sm" style="margin-left:auto;flex-shrink:0" onclick="verifyMaster('${m.id}',1)">✅</button>
      </div>`).join('')
    : '<div style="font-size:13px;color:var(--ink3);padding:10px 0">Нет заявок на верификацию</div>';

  document.getElementById('ov-act-list').innerHTML = getOrders().slice(0, 5).map(o => `
    <div class="log-item">
      <div class="log-ico">${catIco(o.cat)}</div>
      <div><div class="log-t">${o.title}</div><div class="log-s">${o.city} · ${o.budget}€ · ${statusBadge(o.status)}</div></div>
    </div>`).join('');
}

// ── MASTERS ────────────────────────────────────────────────
function renderMasters() {
  const q      = (document.getElementById('ms-q')?.value || '').toLowerCase();
  const filter = document.getElementById('ms-filter')?.value || '';
  const users  = getUsers().filter(u => u.role === 'master');
  document.getElementById('ms-t').textContent = `Мастера (${users.length})`;
  document.getElementById('ms-q').placeholder = 'Поиск по имени, email...';

  let list = users;
  if (q) list = list.filter(m => m.name?.toLowerCase().includes(q) || m.email?.toLowerCase().includes(q) || m.city?.toLowerCase().includes(q));
  if (filter === 'pending')  list = list.filter(m => m.verifStatus === 'pending');
  if (filter === 'verified') list = list.filter(m => m.verifLevel >= 1);
  if (filter === 'sub')      list = list.filter(m => hasSub(m));
  if (filter === 'top')      list = list.filter(m => m.topCity || m.topCountry);
  if (filter === 'blocked')  list = list.filter(m => m.blocked);

  // Add demo masters for display
  const demo = MASTERS.filter(dm => !list.find(u => u.id === dm.id));
  const all  = [...list, ...demo.map(m => ({ ...m, email: m.nm.toLowerCase().replace(' ', '.') + '@demo.com', role: 'master', verifStatus: 'verified', verifLevel: m.lvl, blocked: false }))];

  document.getElementById('masters-tbl').innerHTML = `
    <thead><tr>
      <th>Мастер</th><th>Город / Страна</th><th>Верификация</th><th>Подписка</th><th>ТОП</th><th>Откликов</th><th>Действия</th>
    </tr></thead>
    <tbody>${all.slice(0,30).map(m => `<tr>
      <td><div class="user-cell"><div class="adm-ava">${(m.name||m.nm||'?')[0].toUpperCase()}</div><div><div class="user-nm">${m.name||m.nm}</div><div class="user-em">${m.email||''}</div></div></div></td>
      <td>${cflag(m.country)} ${m.city||'—'}, ${m.country||'—'}</td>
      <td>
        ${m.verifStatus==='pending' ? `<span class="badge badge-y">⏳ На проверке</span>` : m.verifLevel>=1 ? `<span class="badge badge-g">✅ Ур.${m.verifLevel}</span>` : `<span class="badge badge-muted">—</span>`}
      </td>
      <td>${hasSub(m)||m.sub ? `<span class="badge badge-acc">⭐ Активна</span>` : '<span class="badge badge-muted">—</span>'}</td>
      <td>
        ${m.topCity?'🏙️ ':''} ${m.topCountry?'🌍':''}
        ${!m.topCity&&!m.topCountry?'<span style="color:var(--ink4)">—</span>':''}
      </td>
      <td>${(m.responses||[]).length || Math.floor(Math.random()*20)}</td>
      <td><div class="act-btns">
        ${m.verifStatus==='pending' ? `<button class="btn btn-p btn-sm" onclick="verifyMaster('${m.id}',1)">✅ Верифицировать</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openMaster('${m.id}','${m.name||m.nm}')">👁 Детали</button>
        ${m.blocked ? `<button class="btn btn-p btn-sm" onclick="toggleBlock('${m.id}',false)">🔓 Разблок</button>` : `<button class="btn btn-danger btn-sm" onclick="toggleBlock('${m.id}',true)">🚫 Блок</button>`}
      </div></td>
    </tr>`).join('')}</tbody>`;
}

function verifyMaster(id, lvl) {
  updateUser(id, { verifStatus: 'verified', verifLevel: lvl });
  addLog('✅', 'Мастер верифицирован', `ID: ${id}`);
  toast('Мастер верифицирован ✅');
  renderMasters();
  rOverview();
}

function toggleBlock(id, block) {
  updateUser(id, { blocked: block });
  addLog(block ? '🚫' : '🔓', block ? 'Мастер заблокирован' : 'Мастер разблокирован', `ID: ${id}`);
  toast(block ? 'Заблокирован' : 'Разблокирован', block ? 'warn' : 'ok');
  renderMasters();
}

function openMaster(id, name) {
  const users = getUsers();
  const m = users.find(u => u.id === id) || MASTERS.find(m => String(m.id) === id);
  if (!m) return;
  document.getElementById('mm-name').textContent = m.name || m.nm;
  document.getElementById('mm-sub').textContent  = `${m.email || ''} · ${m.city || ''}, ${m.country || ''}`;
  document.getElementById('mm-body').innerHTML = `
    <div class="info-row"><span class="k">Email</span><span class="v">${m.email || '—'}</span></div>
    <div class="info-row"><span class="k">Телефон</span><span class="v">${m.phone || '—'}</span></div>
    <div class="info-row"><span class="k">Telegram</span><span class="v">${m.telegram || '—'}</span></div>
    <div class="info-row"><span class="k">Город</span><span class="v">${m.city || '—'}, ${m.country || '—'}</span></div>
    <div class="info-row"><span class="k">Верификация</span><span class="v">Уровень ${m.verifLevel || 0}</span></div>
    <div class="info-row"><span class="k">Подписка</span><span class="v">${hasSub(m)||m.sub ? '⭐ Активна' : '—'}</span></div>
    <div class="info-row"><span class="k">ТОП город</span><span class="v">${m.topCity ? '✅ Да' : '—'}</span></div>
    <div class="info-row"><span class="k">ТОП страна</span><span class="v">${m.topCountry ? '✅ Да' : '—'}</span></div>
    <div class="info-row"><span class="k">Статус</span><span class="v">${m.blocked ? '🚫 Заблокирован' : '✅ Активен'}</span></div>`;
  document.getElementById('mm-actions').innerHTML = `
    ${m.verifStatus==='pending'?`<button class="btn btn-p btn-sm" onclick="verifyMaster('${id}',1);closeModal('master-modal')">✅ Верифицировать</button>`:''}
    <button class="btn btn-ghost btn-sm" onclick="openAddTopFor('${id}')">🏆 Добавить в ТОП</button>
    ${m.blocked ? `<button class="btn btn-p btn-sm" onclick="toggleBlock('${id}',false);closeModal('master-modal')">🔓 Разблокировать</button>` : `<button class="btn btn-danger btn-sm" onclick="toggleBlock('${id}',true);closeModal('master-modal')">🚫 Заблокировать</button>`}`;
  document.getElementById('master-modal').classList.add('open');
}

// ── CLIENTS ────────────────────────────────────────────────
function renderClients() {
  const q    = (document.getElementById('cl-q')?.value || '').toLowerCase();
  const users = getUsers().filter(u => u.role === 'client');
  document.getElementById('cl-t').textContent = `Заказчики (${users.length})`;
  document.getElementById('cl-q').placeholder = 'Поиск...';
  const list = q ? users.filter(c => c.name?.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q)) : users;
  document.getElementById('clients-tbl').innerHTML = `
    <thead><tr><th>Заказчик</th><th>Страна / Город</th><th>Заявок</th><th>Зарегистрирован</th><th>Действия</th></tr></thead>
    <tbody>${list.length ? list.map(c => {
      const myOrders = getOrders().filter(o => o.clientId === c.id).length;
      return `<tr>
        <td><div class="user-cell"><div class="adm-ava cl">${(c.name||'?')[0].toUpperCase()}</div><div><div class="user-nm">${c.name}</div><div class="user-em">${c.email}</div></div></div></td>
        <td>${c.country ? cflag(c.country) : ''} ${c.city||'—'}, ${c.country||'—'}</td>
        <td>${myOrders}</td>
        <td>${c.createdAt ? new Date(c.createdAt).toLocaleDateString('ru') : '—'}</td>
        <td><div class="act-btns">
          ${c.blocked ? `<button class="btn btn-p btn-sm" onclick="toggleBlock('${c.id}',false)">🔓</button>` : `<button class="btn btn-danger btn-sm" onclick="toggleBlock('${c.id}',true)">🚫</button>`}
        </div></td>
      </tr>`;
    }).join('') : `<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--ink3)">Нет зарегистрированных клиентов</td></tr>`}</tbody>`;
}

// ── ORDERS ─────────────────────────────────────────────────
function renderOrders() {
  const filter = document.getElementById('or-filter')?.value || '';
  const orders = filter ? getOrders().filter(o => o.status === filter) : getOrders();
  document.getElementById('or-t').textContent = `Заявки (${getOrders().length})`;
  document.getElementById('orders-tbl').innerHTML = `
    <thead><tr><th>Заявка</th><th>Клиент</th><th>Город</th><th>Бюджет</th><th>Статус</th><th>Откликов</th><th>Действия</th></tr></thead>
    <tbody>${orders.map(o => `<tr>
      <td><div style="font-weight:800;color:#fff;font-size:13px">${o.title}</div><div style="font-size:11px;color:var(--ink3)">${catIco(o.cat)} ${catName(o.cat)}</div></td>
      <td>${o.clientName || '—'}</td>
      <td>${o.city}, ${o.country}</td>
      <td style="font-family:'Syne',sans-serif;font-weight:900;color:var(--g)">${o.budget}€</td>
      <td>${statusBadge(o.status)}</td>
      <td>${(o.responses || []).length}</td>
      <td><div class="act-btns">
        ${o.status==='open' ? `<button class="btn btn-danger btn-sm" onclick="cancelOrderAdmin(${o.id})">Закрыть</button>` : ''}
      </div></td>
    </tr>`).join('')}</tbody>`;
}

function cancelOrderAdmin(id) {
  updateOrder(id, { status: 'cancelled' });
  addLog('🚫', 'Заявка закрыта администратором', `ID: ${id}`);
  toast('Заявка закрыта', 'warn');
  renderOrders();
}

// ── SUBSCRIPTIONS ──────────────────────────────────────────
function renderSubs() {
  document.getElementById('sb-t').textContent = 'Подписки и платежи';
  const users   = getUsers();
  const masters = users.filter(u => u.role === 'master');
  const active  = masters.filter(m => hasSub(m) || m.sub);
  const topped  = masters.filter(m => m.topCity || m.topCountry);
  const p = cfg.prices || DEFAULTS.prices;
  document.getElementById('sub-stats').innerHTML = [
    { ico:'⭐', v:active.length,  l:'Активных подписок', d:`${active.length * p.subMonthly}€/мес`, cls:'up' },
    { ico:'🏆', v:topped.length,  l:'В ТОПе',            d:`${topped.length * p.topCity}€/мес`, cls:'up' },
    { ico:'💰', v:(active.length * p.subMonthly + topped.length * p.topCity) + '€', l:'Выручка в месяц', d:'Расчётная', cls:'up' },
  ].map(s=>`<div class="adm-s"><div class="adm-s-ico">${s.ico}</div><div class="adm-s-v">${s.v}</div><div class="adm-s-l">${s.l}</div><div class="adm-s-d ${s.cls}">${s.d}</div></div>`).join('');

  document.getElementById('subs-tbl').innerHTML = `
    <thead><tr><th>Мастер</th><th>Подписка</th><th>До</th><th>ТОП</th><th>Действия</th></tr></thead>
    <tbody>${masters.map(m => `<tr>
      <td><div class="user-cell"><div class="adm-ava">${(m.name||'?')[0].toUpperCase()}</div><div><div class="user-nm">${m.name||''}</div><div class="user-em">${m.email||''}</div></div></div></td>
      <td>${hasSub(m)||m.sub ? `<span class="badge badge-acc">⭐ Активна</span>` : '<span class="badge badge-muted">—</span>'}</td>
      <td style="font-size:12px;color:var(--ink3)">${m.subExpiry || '—'}</td>
      <td>${m.topCity?'🏙️ ':''} ${m.topCountry?'🌍':''} ${!m.topCity&&!m.topCountry?'—':''}</td>
      <td><div class="act-btns">
        ${!(hasSub(m)||m.sub) ? `<button class="btn btn-ghost btn-sm" onclick="grantSub('${m.id}')">+ Дать подписку</button>` : `<button class="btn btn-danger btn-sm" onclick="revokeSub('${m.id}')">✕ Отозвать</button>`}
      </div></td>
    </tr>`).join('')}</tbody>`;
}

function grantSub(id) {
  const exp = new Date(); exp.setMonth(exp.getMonth() + 1);
  updateUser(id, { sub: true, subExpiry: exp.toLocaleDateString('ru') });
  addLog('⭐', 'Подписка выдана вручную', `ID: ${id}`);
  toast('Подписка выдана');
  renderSubs();
}
function revokeSub(id) {
  updateUser(id, { sub: false, subExpiry: null });
  addLog('✕', 'Подписка отозвана', `ID: ${id}`);
  toast('Подписка отозвана', 'warn');
  renderSubs();
}

// ── TOP MANAGER ────────────────────────────────────────────
function renderTop() {
  document.getElementById('tp-t').textContent = '🏆 Управление ТОПом';
  const p = cfg.prices || DEFAULTS.prices;
  document.getElementById('tp-city-t').textContent    = `ТОП В ГОРОДЕ (лимит: ${cfg.topLimitCity || 10})`;
  document.getElementById('tp-country-t').textContent = `ТОП В СТРАНЕ (лимит: ${cfg.topLimitCountry || 20})`;

  const users   = getUsers();
  const allM    = [...users.filter(u=>u.role==='master'), ...MASTERS.map(m=>({...m,name:m.nm,email:m.nm+'@demo.com'}))];
  const topCity = allM.filter(m => m.topCity);
  const topCo   = allM.filter(m => m.topCountry);

  const renderTopList = (list, type) => list.length ? list.map(m => `
    <div class="top-row">
      <div class="top-row-l">
        <div class="adm-ava">${(m.name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="top-row-name">${m.name || m.nm}</div>
          <div class="top-row-sub">${m.city || '—'}, ${m.country || '—'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="top-slot">🏆 ТОП</span>
        <button class="btn btn-danger btn-sm" onclick="removeFromTop('${m.id}','${type}')">✕</button>
      </div>
    </div>`).join('')
    : `<div style="font-size:13px;color:var(--ink3);padding:16px;text-align:center">Пусто</div>`;

  document.getElementById('top-city-list').innerHTML    = renderTopList(topCity, 'city');
  document.getElementById('top-country-list').innerHTML = renderTopList(topCo, 'country');
}

function removeFromTop(id, type) {
  if (type === 'city'   || type === 'both') updateUser(id, { topCity: false });
  if (type === 'country'|| type === 'both') updateUser(id, { topCountry: false });
  // Also update MASTERS array in session for demo
  addLog('🏆', 'Убран из ТОПа', `ID: ${id}, тип: ${type}`);
  toast('Убран из ТОПа', 'warn');
  renderTop();
}

function openAddTop() {
  const users  = getUsers().filter(u => u.role === 'master');
  const demoMs = MASTERS.map(m => ({ ...m, name: m.nm, id: String(m.id) }));
  const all    = [...users, ...demoMs];
  document.getElementById('top-sel-master').innerHTML = all.map(m => `<option value="${m.id}">${m.name||m.nm} — ${m.city||'—'}</option>`).join('');
  document.getElementById('top-modal').classList.add('open');
}
function openAddTopFor(id) {
  closeModal('master-modal');
  openAddTop();
  document.getElementById('top-sel-master').value = id;
}
function addToTop() {
  const id    = document.getElementById('top-sel-master').value;
  const type  = document.getElementById('top-sel-type').value;
  const months= parseInt(document.getElementById('top-months').value) || 1;
  const exp   = new Date(); exp.setMonth(exp.getMonth() + months);
  if (type === 'city' || type === 'both')    updateUser(id, { topCity: true,    topCityExpiry: exp.toLocaleDateString('ru') });
  if (type === 'country' || type === 'both') updateUser(id, { topCountry: true, topCountryExpiry: exp.toLocaleDateString('ru') });
  addLog('🏆', 'Добавлен в ТОП администратором', `ID: ${id}, тип: ${type}, срок: ${months}мес`);
  toast('Добавлен в ТОП ✅');
  closeModal('top-modal');
  renderTop();
}

      <div class="setting-row"><span class="setting-k">Лимит ТОП в городе</span><input class="setting-inp" id="sp-topCity-lim" type="number" value="${editSettings.topLimitCity}" min="1" max="100"></div>

        <label class="toggle"><input type="checkbox" id="sn-master" checked><span class="toggle-sl"></span></label></div>
      <div class="setting-row"><span class="setting-k">Telegram-уведомления</span>
        <label class="toggle"><input type="checkbox" id="sn-tg" checked><span class="toggle-sl"></span></label></div>
      <div class="setting-row"><span class="setting-k">Авто-верификация (авто)</span>

      <div class="setting-row"><span class="setting-k">Платёжный шлюз</span>
        <select class="setting-inp" id="sp-gateway" style="width:120px">
          <option value="none">Не подключён</option>

          <option value="revolut">Revolut</option>

function saveSettings2() {
  const s = {
    freeResponses:   parseInt(document.getElementById('sp-freeResp').value) || 2,
    topLimitCity:    parseInt(document.getElementById('sp-topCity-lim').value) || 10,
    topLimitCountry: parseInt(document.getElementById('sp-topCo-lim').value) || 20,
    currency:        document.getElementById('sp-currency').value,
    prices: {
      subMonthly:  parseFloat(document.getElementById('sp-monthly').value) || 29,
      subYearly:   parseFloat(document.getElementById('sp-yearly').value) || 249,
      topCity:     parseFloat(document.getElementById('sp-topCity').value) || 19,
      topCountry:  parseFloat(document.getElementById('sp-topCountry').value) || 39,
    }
  };
  saveSettings(s);
  addLog('⚙️', 'Настройки обновлены', `Подписка: ${s.prices.subMonthly}€/мес, откликов: ${s.freeResponses}`);
  toast('Настройки сохранены ✅');
}

function testPayment() {
  toast('Тестирование... (заглушка — подключите реальный шлюз)', 'warn');
}

// ── LOG ────────────────────────────────────────────────────
function renderLog() {
  document.getElementById('lg-t').textContent = 'Лог действий';
  const logs = getLogs();
  document.getElementById('log-list').innerHTML = logs.length
    ? logs.map(l => `<div class="log-item"><div class="log-ico">${l.ico}</div><div style="flex:1"><div class="log-t">${l.t}</div><div class="log-s">${l.s} · ${l.ts}</div></div></div>`).join('')
    : '<div style="text-align:center;padding:30px;color:var(--ink3);font-size:13px">Лог пуст</div>';
}

// ── Helpers ────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── Sidebar labels ─────────────────────────────────────────
function renderSideLabels() {
  const labels = ['Обзор','Мастера','Заказчики','Заявки','Подписки','ТОП','Настройки','Лог','Выйти'];
  labels.forEach((l,i) => document.getElementById('am'+i).textContent = l);
}

// ── Init ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initNav();
  renderSideLabels();

});
