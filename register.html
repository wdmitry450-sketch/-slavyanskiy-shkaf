<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#06090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sign Up — Slavic Shkaf</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="translations.js"></script>
<script src="shared-functions.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0d1117;--bg3:#111827;
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.12);
  --g:#00d68f;--gl:rgba(0,214,143,.08);
  --acc:#7c6fff;--accl:rgba(124,111,255,.08);
  --red:#ef4444;--yellow:#fbbf24;
  --ink1:#fff;--ink2:rgba(255,255,255,.7);--ink3:rgba(255,255,255,.5);
  --tg-safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-h:64px;
}
body{background:var(--bg);color:var(--ink1);font-family:'Manrope',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-touch-callout:none;-webkit-user-select:none}
button,.btn,input[type="button"],input[type="submit"]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
input,select,textarea{font-size:16px!important}
input,select,textarea{background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:10px;color:#fff;padding:11px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:.2s;-webkit-appearance:none;-moz-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--g);background:rgba(0,214,143,.05)}
select option{background:#1a1f2e;color:#fff}
button{cursor:pointer;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:10px;border:1px solid var(--bdr);background:transparent;color:inherit;font-weight:700;transition:.2s;cursor:pointer}
.btn:hover{border-color:var(--g);background:rgba(0,214,143,.08)}
.btn-fw{width:100%;display:block}
.btn-primary{border-color:var(--g);color:var(--g)}
.btn-primary:hover{background:rgba(0,214,143,.08)}
.nav{display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 20px;border-bottom:1px solid var(--bdr);background:var(--bg2);gap:12px}
.nav-logo{display:flex;align-items:center}
.nav-logo img{height:40px}
.nav-left,.nav-right{display:flex;align-items:center;gap:8px}
.pf-label{font-size:12px;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:block}
.form-block{background:linear-gradient(135deg,#0d1117 0%,rgba(13,17,23,.7) 100%);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:all .3s ease}
.form-block:hover{border-color:rgba(0,214,143,.2);box-shadow:0 6px 20px rgba(0,214,143,.1)}
.pf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.role-btn{padding:20px;border-radius:12px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:#fff;font-weight:700;cursor:pointer;text-align:center;transition:all .3s ease}
.role-btn:hover{border-color:rgba(0,214,143,.3);background:rgba(0,214,143,.05);transform:translateY(-2px)}
.role-btn.active{border-color:var(--g);background:rgba(0,214,143,.12);color:var(--g)}
.toast{position:fixed;bottom:20px;right:20px;padding:14px 20px;border-radius:8px;background:#0d1117;border:1px solid rgba(255,255,255,.08);color:#fff;font-weight:700;z-index:2000;opacity:0;transform:translateX(400px);transition:all .3s ease}
.toast.show{opacity:1;transform:translateX(0)}
.toast-ok{border-color:var(--g);background:rgba(0,214,143,.1);color:var(--g)}
.toast-err{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
@media(max-width:640px){
  .btn{min-height:44px;padding:11px 16px}
  input,select,textarea{min-height:44px}
  .pf-row{grid-template-columns:1fr}
  .nav{height:54px;padding:0 12px}
  .nav-logo img{height:40px}
}
@media(max-width:420px){
  .nav{padding:0 8px;gap:4px;height:54px}
  .nav-logo img{height:36px}
  .btn{padding:10px 16px;font-size:13px;min-height:44px}
  input,select,textarea{padding:10px 12px;font-size:14px;min-height:44px}
  .pf-label{font-size:12px;margin-bottom:6px}
  .form-block{padding:12px}
}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav" id="nav-r">
  <div class="nav-logo"><img src="logo.png" alt="Logo"></div>
  <div class="nav-right">
    <a href="login.html" class="btn btn-ghost">Sign In</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:16px">
  <div style="width:100%;max-width:480px">
    
    <!-- LOGO & TITLE -->
    <div style="text-align:center;margin-bottom:28px">
      <h1 style="font-size:28px;margin-bottom:8px" data-t="auth.register_title">Create Account</h1>
      <p style="color:rgba(255,255,255,.6);margin-bottom:8px">Choose your role to get started</p>
      <a href="login.html" style="color:var(--g);font-weight:700;text-decoration:underline"><span data-t="auth.have_account">Already have?</span> <span data-t="auth.login_link">Sign In</span></a>
    </div>

    <!-- ROLE SELECTION -->
    <div class="form-block">
      <div class="role-select">
        <button class="role-btn active" id="rm" onclick="setRole('master')">
          <div style="font-size:32px;margin-bottom:8px">🔧</div>
          <div style="font-weight:800">I am a master</div>
          <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:4px">Get orders</div>
        </button>
        <button class="role-btn" id="rc" onclick="setRole('client')">
          <div style="font-size:32px;margin-bottom:8px">🏠</div>
          <div style="font-weight:800">I am a client</div>
          <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:4px">Find a master</div>
        </button>
      </div>
    </div>

    <!-- FORM -->
    <div class="form-block">
      <div class="pf-row">
        <div>
          <div class="pf-label">First Name</div>
          <input id="r-fn" placeholder="John">
        </div>
        <div>
          <div class="pf-label">Last Name</div>
          <input id="r-ln" placeholder="Doe">
        </div>
      </div>

      <div style="margin-bottom:12px">
        <div class="pf-label">Email</div>
        <input type="email" id="r-em" placeholder="john@example.com">
      </div>

      <div style="margin-bottom:12px">
        <div class="pf-label">Phone</div>
        <input type="tel" id="r-ph" placeholder="+33 6 XX XX XX XX">
      </div>

      <div class="pf-row">
        <div>
          <div class="pf-label">Country</div>
          <select id="r-co">
            <option value="">— Select country —</option>
          </select>
        </div>
        <div>
          <div class="pf-label">City</div>
          <input id="r-ci" placeholder="Paris">
        </div>
      </div>

      <div class="pf-row">
        <div>
          <div class="pf-label">Postal Code</div>
          <input id="r-pc" placeholder="75001">
        </div>
        <div></div>
      </div>

      <div id="master-extra" style="margin-bottom:12px;display:none">
        <div class="pf-label">Specialties</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:7px" id="cats-sel"></div>
      </div>

      <div style="margin-bottom:16px">
        <div class="pf-label">Password</div>
        <div style="display:flex;gap:4px;align-items:stretch">
          <input type="password" id="r-pw" placeholder="Minimum 6 characters" style="flex:1;min-width:0">
          <button type="button" onclick="togglePassword()" style="background:transparent;border:1px solid var(--bdr);border-radius:10px;width:40px;cursor:pointer;color:#fff;font-size:16px" id="pw-toggle">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-fw" onclick="doRegister()" style="font-size:15px;min-height:48px">Sign Up →</button>
    </div>

  </div>
</div>

<script>
// COUNTRIES
const CO=[
  {f:'🇫🇷',iso:'FR',ru:'Франция',en:'France'},
  {f:'🇩🇪',iso:'DE',ru:'Германия',en:'Germany'},
  {f:'🇪🇸',iso:'ES',ru:'Испания',en:'Spain'},
  {f:'🇮🇹',iso:'IT',ru:'Италия',en:'Italy'},
  {f:'🇧🇪',iso:'BE',ru:'Бельгия',en:'Belgium'},
  {f:'🇳🇱',iso:'NL',ru:'Нидерланды',en:'Netherlands'},
  {f:'🇵🇱',iso:'PL',ru:'Польша',en:'Poland'},
  {f:'🇦🇹',iso:'AT',ru:'Австрия',en:'Austria'},
  {f:'🇨🇭',iso:'CH',ru:'Швейцария',en:'Switzerland'},
  {f:'🇵🇹',iso:'PT',ru:'Португалия',en:'Portugal'},
  {f:'🇸🇪',iso:'SE',ru:'Швеция',en:'Sweden'},
  {f:'🇳🇴',iso:'NO',ru:'Норвегия',en:'Norway'},
  {f:'🇩🇰',iso:'DK',ru:'Дания',en:'Denmark'},
  {f:'🇫🇮',iso:'FI',ru:'Финляндия',en:'Finland'},
  {f:'🇨🇿',iso:'CZ',ru:'Чехия',en:'Czech Republic'},
  {f:'🇸🇰',iso:'SK',ru:'Словакия',en:'Slovakia'},
  {f:'🇭🇺',iso:'HU',ru:'Венгрия',en:'Hungary'},
  {f:'🇷🇴',iso:'RO',ru:'Румыния',en:'Romania'},
  {f:'🇧🇬',iso:'BG',ru:'Болгария',en:'Bulgaria'},
  {f:'🇭🇷',iso:'HR',ru:'Хорватия',en:'Croatia'},
  {f:'🇸🇮',iso:'SI',ru:'Словения',en:'Slovenia'},
  {f:'🇬🇷',iso:'GR',ru:'Греция',en:'Greece'},
  {f:'🇱🇹',iso:'LT',ru:'Литва',en:'Lithuania'},
  {f:'🇱🇻',iso:'LV',ru:'Латвия',en:'Latvia'},
  {f:'🇪🇪',iso:'EE',ru:'Эстония',en:'Estonia'},
  {f:'🇬🇧',iso:'GB',ru:'Великобритания',en:'UK'},
  {f:'🇮🇪',iso:'IE',ru:'Ирландия',en:'Ireland'},
  {f:'🇺🇦',iso:'UA',ru:'Украина',en:'Ukraine'},
  {f:'🇷🇺',iso:'RU',ru:'Россия',en:'Russia'},
  {f:'🇧🇾',iso:'BY',ru:'Беларусь',en:'Belarus'},
  {f:'🇲🇩',iso:'MD',ru:'Молдова',en:'Moldova'},
  {f:'🇷🇸',iso:'RS',ru:'Сербия',en:'Serbia'},
  {f:'🇧🇦',iso:'BA',ru:'Босния',en:'Bosnia'},
  {f:'🇦🇱',iso:'AL',ru:'Албания',en:'Albania'},
  {f:'🇲🇰',iso:'MK',ru:'Македония',en:'Macedonia'},
  {f:'🇲🇪',iso:'ME',ru:'Черногория',en:'Montenegro'},
  {f:'🇰🇿',iso:'KZ',ru:'Казахстан',en:'Kazakhstan'},
  {f:'🇦🇿',iso:'AZ',ru:'Азербайджан',en:'Azerbaijan'},
  {f:'🇬🇪',iso:'GE',ru:'Грузия',en:'Georgia'},
  {f:'🇦🇲',iso:'AM',ru:'Армения',en:'Armenia'},
  {f:'🇮🇱',iso:'IL',ru:'Израиль',en:'Israel'},
  {f:'🇦🇪',iso:'AE',ru:'ОАЭ',en:'UAE'},
  {f:'🇺🇸',iso:'US',ru:'США',en:'USA'},
  {f:'🇨🇦',iso:'CA',ru:'Канада',en:'Canada'},
  {f:'🇦🇺',iso:'AU',ru:'Австралия',en:'Australia'},
];

// FILL COUNTRIES
(function(){
  const sel=document.getElementById('r-co');
  if(!sel) return;
  
  CO.forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c.iso;
    
    // Получить язык напрямую из localStorage, не через getLang()
    const lang=localStorage.getItem('ss_lang')||'ru';
    const label=lang==='ru'?c.ru:c.en;
    
    opt.textContent=c.f+' '+label;
    sel.appendChild(opt);
  });
})();
})();

let regRole='master';
let selCats=[];

function setRole(r){
  regRole=r;
  const M=document.getElementById('rm'),C=document.getElementById('rc');
  if(r==='master'){
    M.classList.add('active');
    C.classList.remove('active');
    document.getElementById('master-extra').style.display='block';
  }else{
    C.classList.add('active');
    M.classList.remove('active');
    document.getElementById('master-extra').style.display='none';
  }
}

function togglePassword(){
  const inp=document.getElementById('r-pw');
  const btn=document.getElementById('pw-toggle');
  if(inp.type==='password'){
    inp.type='text';
    btn.textContent='🙈';
  }else{
    inp.type='password';
    btn.textContent='👁';
  }
}

function doRegister(){
  const fn=document.getElementById('r-fn').value.trim();
  const ln=document.getElementById('r-ln').value.trim();
  const em=document.getElementById('r-em').value.trim();
  const ph=document.getElementById('r-ph').value.trim();
  const co=document.getElementById('r-co').value;
  const ci=document.getElementById('r-ci').value.trim();
  const pc=document.getElementById('r-pc').value.trim();
  const pw=document.getElementById('r-pw').value;

  if(!fn||!em||!pw){
    toast('Please fill all required fields','err');
    return;
  }
  if(!co){
    toast('Please select country','err');
    return;
  }
  if(!ci){
    toast('Please enter city','err');
    return;
  }
  if(pw.length<6){
    toast('Password must be at least 6 characters','err');
    return;
  }

  const user={
    id:'u_'+Date.now(),
    name:fn+(ln?' '+ln:''),
    email:em,
    phone:ph,
    country:co,
    city:ci,
    postalCode:pc,
    password:pw,
    role:regRole,
    cats:selCats,
    createdAt:new Date().toISOString(),
    verifStatus:'pending',
    verifLevel:0
  };

  const users=JSON.parse(localStorage.getItem('ss_users')||'[]');
  if(users.find(u=>u.email===em)){
    toast('Email already in use','err');
    return;
  }

  users.push(user);
  localStorage.setItem('ss_users',JSON.stringify(users));
  localStorage.setItem('ss_auth',JSON.stringify(user));

  toast('Account created! Redirecting...','ok');
  setTimeout(()=>{
    location.href=regRole==='master'?'dashboard.html':'client.html';
  },1500);
}

// Initialize
setRole('master');
</script>

</body>
</html>
