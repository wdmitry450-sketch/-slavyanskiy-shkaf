<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060A0E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Slavic Shkaf — Проверенные мастера по всей Европе</title>
  <link rel="icon" type="image/png" href="/logo-closed.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="/api.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060A0E; font-family: sans-serif; }
    #root { max-width: 480px; margin: 0 auto; }
    .pre-load { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    .pre-load img { width: 100px; animation: pulse 1.5s infinite; }
    .pre-load span { color: #10b981; font-size: 14px; font-family: sans-serif; }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.96); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="pre-load">
      <img src="/logo-closed.png" alt="Slavic Shkaf">
      <span>Загрузка...</span>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
