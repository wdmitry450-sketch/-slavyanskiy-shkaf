<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Сброс пароля</title>
<link rel="stylesheet" href="styles.css">
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--bg);position:relative;overflow:hidden}
.auth-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 40%,rgba(0,214,143,.06),transparent 65%)}
.auth-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:24px;padding:40px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo img{height:52px;width:auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.auth-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.auth-sub{font-size:13px;color:var(--ink3);text-align:center;margin-bottom:28px;line-height:1.6}
.step-panel{display:none}.step-panel.active{display:block}
.code-inputs{display:flex;gap:10px;justify-content:center;margin:18px 0}
.code-inp{width:52px;height:56px;border-radius:12px;border:1.5px solid var(--bdr2);background:var(--bg3);color:#fff;font-size:22px;font-weight:900;text-align:center;outline:none;transition:.2s;font-family:'Syne',sans-serif}
.code-inp:focus{border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}
.back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px;font-size:13px;color:var(--ink3);font-weight:600;transition:.15s}
.back-link:hover{color:var(--g)}
.success-ico{font-size:52px;text-align:center;margin-bottom:16px}
.lang-row{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.lang-pill{padding:5px 14px;border-radius:50px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--ink3);transition:.15s}
.lang-pill.on{background:var(--gl);border-color:var(--g);color:var(--g)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><a href="index.html"><img src="logo.png" alt="Slavic Shkaf"></a></div>
    <div class="lang-row">
      <button class="lang-pill" id="lp-ru" onclick="switchLang('ru')">🇷🇺 Русский</button>
      <button class="lang-pill" id="lp-en" onclick="switchLang('en')">🇬🇧 English</button>
    </div>

    <!-- Step 1: Email -->
    <div class="step-panel active" id="s1">
      <div class="auth-title" id="s1-title"></div>
      <div class="auth-sub"   id="s1-sub"></div>
      <div class="fg"><label class="fl">Email</label>
        <input class="fi" type="email" id="inp-email" placeholder="you@example.com"
               onkeydown="if(event.key==='Enter')sendCode()"></div>
      <button class="btn btn-p btn-fw" id="btn-s1" onclick="sendCode()"></button>
      <a href="login.html" class="back-link" id="l-back1"></a>
    </div>

    <!-- Step 2: Code -->
    <div class="step-panel" id="s2">
      <div class="auth-title" id="s2-title"></div>
      <div class="auth-sub"   id="s2-sub"></div>
      <div class="code-inputs">
        <input class="code-inp" maxlength="1" id="c0" oninput="codeInput(0)">
        <input class="code-inp" maxlength="1" id="c1" oninput="codeInput(1)">
        <input class="code-inp" maxlength="1" id="c2" oninput="codeInput(2)">
        <input class="code-inp" maxlength="1" id="c3" oninput="codeInput(3)">
      </div>
      <button class="btn btn-p btn-fw" id="btn-s2" onclick="verifyCode()"></button>
      <div style="text-align:center;margin-top:12px">
        <button class="btn btn-ghost btn-sm" onclick="resendCode()" id="btn-resend"></button>
      </div>
      <a href="#" class="back-link" onclick="showStep(1)" id="l-back2"></a>
    </div>

    <!-- Step 3: New password -->
    <div class="step-panel" id="s3">
      <div class="auth-title" id="s3-title"></div>
      <div class="auth-sub"   id="s3-sub"></div>
      <div class="fg"><label class="fl" id="l-np"></label>
        <input class="fi" type="password" id="inp-np" placeholder="••••••••"></div>
      <div class="fg"><label class="fl" id="l-np2"></label>
        <input class="fi" type="password" id="inp-np2" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')setNewPass()"></div>
      <button class="btn btn-p btn-fw" id="btn-s3" onclick="setNewPass()"></button>
    </div>

    <!-- Step 4: Success -->
    <div class="step-panel" id="s4">
      <div class="success-ico">✅</div>
      <div class="auth-title" id="s4-title"></div>
      <div class="auth-sub"   id="s4-sub"></div>
      <a href="login.html" class="btn btn-p btn-fw" style="display:flex;margin-top:8px" id="btn-s4"></a>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
let currentStep = 1;
let generatedCode = '';
let targetEmail = '';

function switchLang(l) { LANG=l; localStorage.setItem('shkaf_lang',l); render(); }

function showStep(n) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  currentStep = n;
}

function render() {
  document.getElementById('lp-ru').classList.toggle('on', LANG==='ru');
  document.getElementById('lp-en').classList.toggle('on', LANG==='en');

  const ru = LANG==='ru';
  document.getElementById('s1-title').textContent = t('resetPassword');
  document.getElementById('s1-sub').textContent   = ru ? 'Введите email и мы пришлём код подтверждения' : 'Enter your email and we\'ll send a verification code';
  document.getElementById('btn-s1').textContent   = ru ? 'Отправить код' : 'Send Code';
  document.getElementById('l-back1').textContent  = t('backToLogin');

  document.getElementById('s2-title').textContent = ru ? 'Введите код' : 'Enter Code';
  document.getElementById('s2-sub').textContent   = ru ? `Код отправлен на ${targetEmail||'ваш email'}` : `Code sent to ${targetEmail||'your email'}`;
  document.getElementById('btn-s2').textContent   = ru ? 'Подтвердить' : 'Verify';
  document.getElementById('btn-resend').textContent = ru ? '↺ Отправить снова' : '↺ Resend';
  document.getElementById('l-back2').textContent  = t('backToLogin');

  document.getElementById('s3-title').textContent = ru ? 'Новый пароль' : 'New Password';
  document.getElementById('s3-sub').textContent   = ru ? 'Придумайте надёжный пароль' : 'Create a strong password';
  document.getElementById('l-np').textContent     = ru ? 'Новый пароль' : 'New password';
  document.getElementById('l-np2').textContent    = ru ? 'Повторите пароль' : 'Confirm password';
  document.getElementById('btn-s3').textContent   = ru ? 'Сохранить пароль' : 'Save Password';

  document.getElementById('s4-title').textContent = ru ? 'Пароль изменён!' : 'Password Changed!';
  document.getElementById('s4-sub').textContent   = ru ? 'Теперь войдите с новым паролем' : 'Now sign in with your new password';
  document.getElementById('btn-s4').textContent   = t('login');
}

function sendCode() {
  const email = document.getElementById('inp-email').value.trim();
  if (!email) { toast(LANG==='ru'?'Введите email':'Enter email','err'); return; }
  // Check user exists
  const users = getUsers();
  const exists = users.find(u=>u.email===email) || email==='admin@slavic-shkaf.eu';
  if (!exists) { toast(LANG==='ru'?'Email не найден':'Email not found','err'); return; }
  targetEmail = email;
  generatedCode = Math.floor(1000+Math.random()*9000).toString();
  console.log('Reset code:', generatedCode); // In prod — send via email
  toast(LANG==='ru'?`Код: ${generatedCode} (консоль)`:`Code: ${generatedCode} (console)`,'warn');
  document.getElementById('s2-sub').textContent = (LANG==='ru'?`Код отправлен на `:`Code sent to `)+email;
  showStep(2);
  render();
  setTimeout(()=>document.getElementById('c0').focus(),100);
}

function codeInput(idx) {
  const val = document.getElementById('c'+idx).value;
  if (val && idx < 3) document.getElementById('c'+(idx+1)).focus();
  if (idx === 3) verifyCode();
}

function verifyCode() {
  const entered = [0,1,2,3].map(i=>document.getElementById('c'+i).value).join('');
  if (entered.length < 4) { toast(LANG==='ru'?'Введите 4 цифры':'Enter 4 digits','err'); return; }
  if (entered !== generatedCode) { toast(LANG==='ru'?'Неверный код':'Invalid code','err'); return; }
  showStep(3);
  setTimeout(()=>document.getElementById('inp-np').focus(),100);
}

function resendCode() {
  generatedCode = Math.floor(1000+Math.random()*9000).toString();
  console.log('New reset code:', generatedCode);
  toast(LANG==='ru'?`Новый код: ${generatedCode}`:`New code: ${generatedCode}`,'warn');
}

function setNewPass() {
  const np  = document.getElementById('inp-np').value;
  const np2 = document.getElementById('inp-np2').value;
  if (np.length < 6) { toast(LANG==='ru'?'Минимум 6 символов':'Minimum 6 characters','err'); return; }
  if (np !== np2)    { toast(LANG==='ru'?'Пароли не совпадают':'Passwords do not match','err'); return; }
  resetPassword(targetEmail, np);
  showStep(4);
}

render();
</script>
</body>
</html>
