<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Сброс пароля</title>
<style>
/* ═══════════════════════════════════════════════════════════
   SLAVIC SHKAF — SHARED STYLES
   Подключается на каждой странице
═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #06090f;
  --bg2:  #0d1117;
  --bg3:  #131920;
  --card: #1a222d;
  --bdr:  rgba(255,255,255,.08);
  --bdr2: rgba(255,255,255,.15);
  --g:    #00d68f;
  --g2:   #00a96e;
  --gl:   rgba(0,214,143,.10);
  --gb:   rgba(0,214,143,.18);
  --acc:  #7c6fff;
  --accl: rgba(124,111,255,.12);
  --ink:  #fff;
  --ink2: rgba(255,255,255,.72);
  --ink3: rgba(255,255,255,.42);
  --ink4: rgba(255,255,255,.16);
  --red:  #ff4d4f;
  --yel:  #ffc53d;
}

html  { scroll-behavior: smooth; }
body  { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--ink);
        overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5; }
a     { text-decoration: none; color: inherit; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }
::-webkit-scrollbar       { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px; }

/* ── NAV ──────────────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; padding: 0 5%; height: 68px; gap: 16px;
  background: rgba(6,9,15,.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bdr);
}

/* Logo with real image */
.nav-logo { display: flex; align-items: center; flex-shrink: 0; }
.nav-logo-img {
  height: 44px;   /* высота в шапке */
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.5));
  transition: transform .2s, filter .2s;
}
.nav-logo:hover .nav-logo-img {
  transform: scale(1.04);
  filter: drop-shadow(0 4px 14px rgba(0,0,0,.6));
}

.nav-links          { display: flex; gap: 2px; margin: 0 auto; list-style: none; }
.nav-links a        { padding: 8px 14px; border-radius: 8px; font-size: 14px;
                      font-weight: 600; color: var(--ink3); transition: .15s; }
.nav-links a:hover,
.nav-links a.active { color: #fff; background: rgba(255,255,255,.06); }

#nav-r              { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.nav-btn-ghost      { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600;
                      color: var(--ink2); border: 1px solid var(--bdr); background: transparent;
                      cursor: pointer; transition: .15s; }
.nav-btn-ghost:hover{ border-color: var(--bdr2); color: #fff; }
.nav-btn-cta        { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 800;
                      background: var(--g); color: #000; border: none; cursor: pointer;
                      transition: .15s; }
.nav-btn-cta:hover  { background: var(--g2); }

.nav-user-btn            { display: flex; align-items: center; gap: 9px; }
.nav-ava                 { width: 34px; height: 34px; border-radius: 50%; background: var(--gl);
                           border: 2px solid var(--g); display: flex; align-items: center;
                           justify-content: center; font-size: 14px; font-weight: 900; color: var(--g); }
.nav-uname               { font-size: 14px; font-weight: 700; color: #fff; transition: .15s; }
.nav-user-btn:hover .nav-uname { color: var(--g); }

.nav-burger      { display: none; flex-direction: column; gap: 5px; cursor: pointer;
                   background: none; border: none; padding: 4px; margin-left: 4px; }
.nav-burger span { width: 22px; height: 2px; background: #fff; border-radius: 2px; display: block; }

.nav-mob       { display: none; position: fixed; inset: 68px 0 0;
                 background: rgba(6,9,15,.98); backdrop-filter: blur(16px);
                 border-top: 1px solid var(--bdr); padding: 20px 5%;
                 flex-direction: column; gap: 4px; z-index: 199; overflow-y: auto; }
.nav-mob.open  { display: flex; }
.nav-mob a     { padding: 13px 14px; border-radius: 10px; font-size: 16px;
                 font-weight: 600; color: var(--ink2); }
.nav-mob a:hover { color: #fff; background: rgba(255,255,255,.06); }

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn      { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            border-radius: 10px; font-weight: 700; cursor: pointer; transition: .15s;
            border: none; text-decoration: none; font-family: inherit; }
.btn-p    { background: var(--g);  color: #000; padding: 13px 22px; font-size: 15px; font-weight: 800; }
.btn-p:hover { background: var(--g2); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(0,214,143,.22); }
.btn-p:disabled { opacity: .4; pointer-events: none; }
.btn-o    { background: transparent; color: var(--ink2); padding: 10px 18px;
            font-size: 14px; border: 1px solid var(--bdr2); }
.btn-o:hover { border-color: var(--g); color: var(--g); }
.btn-ghost{ background: rgba(255,255,255,.06); color: var(--ink2); padding: 10px 18px;
            font-size: 14px; border: 1px solid var(--bdr); }
.btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }
.btn-tg   { background: var(--bg3); color: var(--ink2); padding: 11px 18px;
            font-size: 14px; border: 1px solid var(--bdr2); }
.btn-tg:hover { border-color: #2AABEE; color: #2AABEE; }
.btn-danger { background: rgba(255,77,79,.1); color: var(--red); padding: 10px 18px;
              font-size: 14px; border: 1px solid rgba(255,77,79,.2); }
.btn-danger:hover { background: rgba(255,77,79,.18); }
.btn-sm  { padding: 7px 13px !important; font-size: 13px !important; border-radius: 8px !important; }
.btn-lg  { padding: 15px 28px; font-size: 16px; border-radius: 12px; }
.btn-fw  { width: 100%; }

/* ── FORMS ────────────────────────────────────────────────── */
.fg  { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.fl  { font-size: 11px; font-weight: 800; text-transform: uppercase;
       letter-spacing: .7px; color: var(--ink3); }
.fi  { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--bdr2);
       background: var(--bg3); color: #fff; font-size: 14px; outline: none;
       transition: .2s; width: 100%; }
.fi:focus       { border-color: var(--g); box-shadow: 0 0 0 3px var(--gl); background: var(--bg2); }
.fi::placeholder{ color: var(--ink3); }
textarea.fi     { resize: vertical; min-height: 88px; }
.form-row       { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.or-div         { display: flex; align-items: center; gap: 10px; margin: 16px 0;
                  font-size: 11px; color: var(--ink3); font-weight: 800;
                  text-transform: uppercase; letter-spacing: .6px; }
.or-div::before,
.or-div::after  { content: ''; flex: 1; height: 1px; background: var(--bdr); }

/* ── BADGES ───────────────────────────────────────────────── */
.badge       { display: inline-flex; align-items: center; gap: 4px;
               padding: 4px 10px; border-radius: 50px; font-size: 11px;
               font-weight: 800; white-space: nowrap; }
.badge-g     { background: var(--gl);  color: var(--g);   border: 1px solid rgba(0,214,143,.2); }
.badge-acc   { background: var(--accl);color: var(--acc);  border: 1px solid rgba(124,111,255,.2); }
.badge-y     { background: rgba(255,197,61,.12); color: var(--yel); border: 1px solid rgba(255,197,61,.22); }
.badge-r     { background: rgba(255,77,79,.1);   color: var(--red); border: 1px solid rgba(255,77,79,.16); }
.badge-muted { background: rgba(255,255,255,.05); color: var(--ink3); border: 1px solid var(--bdr); }

/* ── CARD ─────────────────────────────────────────────────── */
.card      { background: var(--bg2); border-radius: 16px; border: 1px solid var(--bdr); transition: .2s; }
.card-p    { padding: 24px; }
.card:hover{ border-color: var(--bdr2); }
.card-t    { font-size: 13px; font-weight: 800; text-transform: uppercase;
             letter-spacing: .7px; color: var(--ink3); margin-bottom: 18px;
             padding-bottom: 12px; border-bottom: 1px solid var(--bdr); }

/* ── MASTER CARD ──────────────────────────────────────────── */
.mcard     { display: block; border-radius: 16px; overflow: hidden; background: var(--bg2);
             border: 1px solid var(--bdr); cursor: pointer; transition: .22s; }
.mcard:hover { border-color: var(--g); transform: translateY(-4px);
               box-shadow: 0 18px 50px rgba(0,214,143,.08); }
.mcard-top   { height: 108px; position: relative;
               background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
               display: flex; align-items: center; justify-content: center; }
.mcard-ava   { font-size: 46px; }
.mcard-online{ position: absolute; bottom: 10px; right: 10px; width: 10px; height: 10px;
               border-radius: 50%; background: var(--g); border: 2px solid var(--bg2);
               animation: onpulse 2s infinite; }
@keyframes onpulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,214,143,.4); }
  60%     { box-shadow: 0 0 0 5px rgba(0,214,143,0); }
}
.mcard-badge { position: absolute; top: 10px; right: 10px; }
.mcard-body  { padding: 16px; }
.mcard-name  { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.mcard-city  { font-size: 12px; color: var(--ink3); margin-bottom: 10px; font-weight: 600; }
.mcard-tags  { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.mcard-tag   { padding: 3px 9px; border-radius: 6px; background: rgba(255,255,255,.05);
               border: 1px solid var(--bdr); font-size: 11px; font-weight: 600; color: var(--ink3); }
.mcard-foot  { display: flex; align-items: center; justify-content: space-between;
               padding-top: 11px; border-top: 1px solid var(--bdr); }
.mcard-rate  { font-size: 12px; color: var(--ink3); font-weight: 600; }
.mcard-rate strong { color: #fff; }
.mcard-price { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 900; color: var(--g); }
.mcard-price span { font-size: 11px; color: var(--ink3); font-family: 'Manrope', sans-serif; font-weight: 500; }

/* ── LAYOUT ───────────────────────────────────────────────── */
.pt      { padding-top: 68px; }
.section { padding: 80px 5%; }
.wrap    { max-width: 1160px; margin: 0 auto; }
.slbl    { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
           color: var(--g); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.slbl::after { content: ''; width: 30px; height: 1px; background: var(--g); }
.sh2     { font-family: 'Syne', sans-serif; font-size: clamp(24px,3.5vw,42px); font-weight: 900;
           letter-spacing: -.03em; line-height: 1.1; color: #fff; margin-bottom: 12px; }
.sh2 .g  { color: var(--g); }
.sp      { font-size: 15px; color: var(--ink3); line-height: 1.7; font-weight: 500; max-width: 500px; }
.sec-head{ display: flex; align-items: flex-end; justify-content: space-between;
           margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
.see-all { font-size: 14px; font-weight: 700; color: var(--g); transition: .15s; }
.see-all:hover { color: #fff; }

/* ── DASHBOARD ────────────────────────────────────────────── */
.dash-wrap { display: flex; min-height: calc(100vh - 68px); }
.dash-side { width: 240px; background: var(--bg2); border-right: 1px solid var(--bdr);
             padding: 20px 0; flex-shrink: 0; position: sticky; top: 68px;
             height: calc(100vh - 68px); overflow-y: auto; }
.dash-side-user   { padding: 0 16px 16px; border-bottom: 1px solid var(--bdr); margin-bottom: 8px; }
.dash-side-ava    { width: 40px; height: 40px; border-radius: 11px; display: flex;
                    align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; }
.dash-side-name   { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.dash-side-role   { font-size: 11px; font-weight: 800; }
.ds-item  { display: flex; align-items: center; gap: 11px; padding: 11px 20px;
            font-size: 14px; font-weight: 600; color: var(--ink3);
            cursor: pointer; transition: .15s; text-decoration: none; }
.ds-item:hover  { color: #fff; background: rgba(255,255,255,.04); }
.ds-item.active { color: var(--g); background: var(--gl); }
.ds-ico   { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
.ds-sep   { height: 1px; background: var(--bdr); margin: 10px 14px; }
.dash-main{ flex: 1; padding: 32px; background: var(--bg); min-width: 0; }
.tab-panel        { display: none; }
.tab-panel.active { display: block; }
.d-head   { display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 14px; }
.d-title  { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 900;
            color: #fff; letter-spacing: -.02em; }

/* ── STAT CARDS ───────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr));
              gap: 14px; margin-bottom: 24px; }
.s-card { background: var(--bg2); border-radius: 14px; padding: 20px; border: 1px solid var(--bdr); }
.s-ico  { font-size: 22px; margin-bottom: 10px; }
.s-val  { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900;
          color: #fff; line-height: 1; letter-spacing: -.02em; }
.s-val em   { color: var(--g); font-style: normal; }
.s-lbl      { font-size: 12px; color: var(--ink3); font-weight: 700; margin-top: 5px; }
.s-delta    { font-size: 11px; font-weight: 800; margin-top: 6px; }
.up { color: #52c41a; } .dn { color: var(--red); }

/* ── TABLE ────────────────────────────────────────────────── */
.tbl-wrap{ overflow-x: auto; }
.tbl     { width: 100%; border-collapse: collapse; }
.tbl th  { padding: 10px 14px; font-size: 11px; font-weight: 800; text-transform: uppercase;
           letter-spacing: .7px; color: var(--ink3); border-bottom: 1px solid var(--bdr);
           text-align: left; white-space: nowrap; }
.tbl td  { padding: 13px 14px; font-size: 13px; color: var(--ink2);
           border-bottom: 1px solid var(--bdr); vertical-align: middle; }
.tbl tr:hover td      { background: rgba(255,255,255,.015); }
.tbl tr:last-child td { border-bottom: none; }

/* ── VERIFICATION TRACK ───────────────────────────────────── */
.vt-item      { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--bdr); }
.vt-item:last-child { border-bottom: none; }
.vt-left      { display: flex; flex-direction: column; align-items: center;
                width: 20px; flex-shrink: 0; margin-top: 3px; }
.vt-dot       { width: 14px; height: 14px; border-radius: 50%; background: var(--bdr2); flex-shrink: 0; }
.vt-dot.done  { background: var(--g); }
.vt-dot.pend  { background: var(--yel); animation: vpulse 1.5s infinite; }
@keyframes vpulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
.vt-line      { width: 2px; flex: 1; min-height: 16px; background: var(--bdr); margin-top: 3px; }
.vt-t         { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.vt-p         { font-size: 12px; color: var(--ink3); }

/* ── BAR CHART ────────────────────────────────────────────── */
.bar-row   { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.bar-lbl   { font-size: 13px; color: var(--ink3); font-weight: 600; width: 120px; flex-shrink: 0; }
.bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 4px; transition: .8s ease; }
.bar-pct   { font-size: 12px; font-weight: 800; color: #fff; width: 36px;
             text-align: right; flex-shrink: 0; }

/* ── REVEAL ───────────────────────────────────────────────── */
.rv     { opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease; }
.rv.vis { opacity: 1; transform: translateY(0); }

/* ── FOOTER ───────────────────────────────────────────────── */
footer  { background: var(--bg); border-top: 1px solid var(--bdr); padding: 52px 5% 28px; }
.f-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px;
          max-width: 1160px; margin: 0 auto 36px; }
.f-logo { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 900; color: #fff;
          display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.f-logo-img { height: 36px; width: auto; object-fit: contain;
              filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
.f-desc { font-size: 13px; color: var(--ink3); line-height: 1.65; max-width: 185px; font-weight: 500; }
.f-col h4   { font-size: 10px; font-weight: 800; color: var(--ink4); text-transform: uppercase;
              letter-spacing: 1px; margin-bottom: 14px; }
.f-col a    { display: block; font-size: 13px; color: var(--ink3); margin-bottom: 9px;
              transition: .15s; font-weight: 500; }
.f-col a:hover { color: #fff; }
.f-bot  { max-width: 1160px; margin: 0 auto; display: flex; justify-content: space-between;
          padding-top: 20px; border-top: 1px solid var(--bdr); font-size: 11px;
          color: var(--ink3); font-weight: 600; flex-wrap: wrap; gap: 8px; }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 1024px) {
  .nav-links, .nav-btn-ghost, .nav-btn-cta { display: none; }
  .nav-burger { display: flex !important; }
  .dash-side  { display: none; }
  .dash-wrap  { flex-direction: column; }
  .dash-main  { padding: 20px 16px; }
  .f-grid     { grid-template-columns: 1fr 1fr; gap: 28px; }
  .form-row   { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .section    { padding: 56px 5%; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .f-grid     { grid-template-columns: 1fr; }
  .sec-head   { flex-direction: column; align-items: flex-start; }
}

/* ── LANG BUTTON ──────────────────────────────────────────── */
.lang-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
  background: rgba(255,255,255,.06); border: 1px solid var(--bdr); color: var(--ink2);
  cursor: pointer; transition: .15s; flex-shrink: 0;
}
.lang-btn:hover { border-color: var(--bdr2); color: #fff; }

/* ── AUTH PAGES ───────────────────────────────────────────── */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center;
             padding: 20px; background: var(--bg); position: relative; overflow: hidden; }
.auth-wrap::before { content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(0,214,143,.06) 0%, transparent 65%),
              radial-gradient(ellipse 50% 40% at 70% 60%, rgba(124,111,255,.06) 0%, transparent 65%); }
.auth-card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: 22px;
             padding: 40px; width: 100%; max-width: 460px; position: relative; z-index: 1;
             box-shadow: 0 32px 80px rgba(0,0,0,.5); }
.auth-logo { display: flex; justify-content: center; margin-bottom: 28px; }
.auth-logo img { height: 52px; width: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,.5)); }
.auth-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 900; color: #fff;
              text-align: center; margin-bottom: 4px; letter-spacing: -.02em; }
.auth-sub { font-size: 13px; color: var(--ink3); text-align: center; margin-bottom: 28px; font-weight: 600; }
.auth-foot { font-size: 13px; color: var(--ink3); text-align: center; margin-top: 16px; font-weight: 600; }
.auth-foot a { color: var(--g); font-weight: 700; }
.auth-foot a:hover { color: #fff; }
.form-err { background: rgba(255,77,79,.1); border: 1px solid rgba(255,77,79,.2); border-radius: 10px;
            padding: 11px 14px; font-size: 13px; color: var(--red); margin-bottom: 14px; display: none; }
.demo-hint { background: var(--gl); border: 1px solid rgba(0,214,143,.2); border-radius: 10px;
             padding: 12px 14px; margin-bottom: 20px; font-size: 12px; color: var(--ink2); line-height: 1.7; }
.demo-hint strong { color: var(--g); }
.auth-lang { position: absolute; top: 16px; right: 16px; }

/* ── REGISTER STEPS ───────────────────────────────────────── */
.step-bar { display: flex; gap: 6px; margin-bottom: 28px; }
.step-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--bdr2); transition: .3s; }
.step-dot.done { background: var(--g); }
.step-dot.active { background: var(--g); opacity: .5; }
.role-sel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
.role-opt { padding: 18px 14px; border-radius: 14px; border: 1.5px solid var(--bdr);
            background: var(--bg3); cursor: pointer; text-align: center; transition: .2s; }
.role-opt:hover { border-color: var(--bdr2); }
.role-opt.on { border-color: var(--g); background: var(--gl); }
.role-opt.on.cl { border-color: var(--acc); background: var(--accl); }
.ro-ico { font-size: 26px; margin-bottom: 8px; }
.ro-t { font-size: 14px; font-weight: 800; color: #fff; }
.ro-s { font-size: 11px; color: var(--ink3); margin-top: 3px; }
.cats-grid-sm { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin-top: 8px; }
.cat-opt { padding: 10px 8px; border-radius: 10px; background: var(--bg3); border: 1.5px solid var(--bdr);

<script>
let currentStep = 1;
let generatedCode = '';
let targetEmail = '';

function switchLang(l) { LANG=l; localStorage.setItem('shkaf_lang',l); render(); }

function showStep(n) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  currentStep = n;
}

function render() {
  document.getElementById('lp-ru').classList.toggle('on', LANG==='ru');
  document.getElementById('lp-en').classList.toggle('on', LANG==='en');

  const ru = LANG==='ru';
  document.getElementById('s1-title').textContent = t('resetPassword');
  document.getElementById('s1-sub').textContent   = ru ? 'Введите email и мы пришлём код подтверждения' : 'Enter your email and we\'ll send a verification code';
  document.getElementById('btn-s1').textContent   = ru ? 'Отправить код' : 'Send Code';
  document.getElementById('l-back1').textContent  = t('backToLogin');

  document.getElementById('s2-title').textContent = ru ? 'Введите код' : 'Enter Code';
  document.getElementById('s2-sub').textContent   = ru ? `Код отправлен на ${targetEmail||'ваш email'}` : `Code sent to ${targetEmail||'your email'}`;
  document.getElementById('btn-s2').textContent   = ru ? 'Подтвердить' : 'Verify';
  document.getElementById('btn-resend').textContent = ru ? '↺ Отправить снова' : '↺ Resend';
  document.getElementById('l-back2').textContent  = t('backToLogin');

  document.getElementById('s3-title').textContent = ru ? 'Новый пароль' : 'New Password';
  document.getElementById('s3-sub').textContent   = ru ? 'Придумайте надёжный пароль' : 'Create a strong password';
  document.getElementById('l-np').textContent     = ru ? 'Новый пароль' : 'New password';
  document.getElementById('l-np2').textContent    = ru ? 'Повторите пароль' : 'Confirm password';
  document.getElementById('btn-s3').textContent   = ru ? 'Сохранить пароль' : 'Save Password';

  document.getElementById('s4-title').textContent = ru ? 'Пароль изменён!' : 'Password Changed!';
  document.getElementById('s4-sub').textContent   = ru ? 'Теперь войдите с новым паролем' : 'Now sign in with your new password';
  document.getElementById('btn-s4').textContent   = t('login');
}

function sendCode() {
  const email = document.getElementById('inp-email').value.trim();
  if (!email) { toast(LANG==='ru'?'Введите email':'Enter email','err'); return; }
  // Check user exists
  const users = getUsers();
  const exists = users.find(u=>u.email===email) || email==='admin@slavic-shkaf.eu';
  if (!exists) { toast(LANG==='ru'?'Email не найден':'Email not found','err'); return; }
  targetEmail = email;
  generatedCode = Math.floor(1000+Math.random()*9000).toString();
  console.log('Reset code:', generatedCode); // In prod — send via email
  toast(LANG==='ru'?`Код: ${generatedCode} (консоль)`:`Code: ${generatedCode} (console)`,'warn');
  document.getElementById('s2-sub').textContent = (LANG==='ru'?`Код отправлен на `:`Code sent to `)+email;
  showStep(2);
  render();
  setTimeout(()=>document.getElementById('c0').focus(),100);
}

function codeInput(idx) {
  const val = document.getElementById('c'+idx).value;
  if (val && idx < 3) document.getElementById('c'+(idx+1)).focus();
  if (idx === 3) verifyCode();
}

function verifyCode() {
  const entered = [0,1,2,3].map(i=>document.getElementById('c'+i).value).join('');
  if (entered.length < 4) { toast(LANG==='ru'?'Введите 4 цифры':'Enter 4 digits','err'); return; }
  if (entered !== generatedCode) { toast(LANG==='ru'?'Неверный код':'Invalid code','err'); return; }
  showStep(3);
  setTimeout(()=>document.getElementById('inp-np').focus(),100);
}

function resendCode() {
  generatedCode = Math.floor(1000+Math.random()*9000).toString();
  console.log('New reset code:', generatedCode);
  toast(LANG==='ru'?`Новый код: ${generatedCode}`:`New code: ${generatedCode}`,'warn');
}

function setNewPass() {
  const np  = document.getElementById('inp-np').value;
  const np2 = document.getElementById('inp-np2').value;
  if (np.length < 6) { toast(LANG==='ru'?'Минимум 6 символов':'Minimum 6 characters','err'); return; }
  if (np !== np2)    { toast(LANG==='ru'?'Пароли не совпадают':'Passwords do not match','err'); return; }
  resetPassword(targetEmail, np);
  showStep(4);
}

render();
</script>
