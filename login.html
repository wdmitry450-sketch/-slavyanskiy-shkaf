<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — Slavic Shkaf</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06090f;--bg2:#0d1117;--bg3:#111827;--bdr:rgba(255,255,255,.08);
  --g:#00d68f;--gl:rgba(0,214,143,.08);--acc:#7c6fff;--accl:rgba(124,111,255,.08);
  --ink1:#fff;--ink2:rgba(255,255,255,.7);--ink3:rgba(255,255,255,.4);
  --red:#ef4444;--yellow:#fbbf24;--radius:12px}
body{background:var(--bg);color:var(--ink1);font-family:'Manrope',sans-serif;font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}
input,select,textarea{background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:10px;
  color:#fff;padding:11px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:.2s}
input:focus,select:focus,textarea:focus{border-color:var(--g);background:rgba(0,214,143,.05)}
select option{background:#1a1f2e;color:#fff}
button{cursor:pointer;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;
  border-radius:10px;font-weight:700;font-size:14px;border:none;transition:.2s;white-space:nowrap}
.btn-p{background:var(--g);color:#000}.btn-p:hover{background:#00c07e;transform:translateY(-1px)}
.btn-o{background:transparent;border:1px solid var(--bdr);color:#fff}.btn-o:hover{border-color:var(--g)}
.btn-r{background:var(--red);color:#fff}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
.btn-fw{width:100%}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;
  font-size:11px;font-weight:800;background:rgba(255,255,255,.1)}
.badge-g{background:rgba(0,214,143,.15);color:#00d68f}
.badge-y{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-b{background:rgba(124,111,255,.15);color:#a78bfa}
.badge-r{background:rgba(239,68,68,.15);color:#ef4444}

/* NAV */
.nav{height:64px;display:flex;align-items:center;padding:0 28px;gap:24px;
  background:rgba(6,9,15,.95);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nav-logo img{height:48px;object-fit:contain}
.nav-links{display:flex;gap:24px;list-style:none;margin-left:auto}
.nav-links a{color:var(--ink2);font-weight:600;font-size:13px;transition:.2s}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-r{display:flex;align-items:center;gap:10px;margin-left:16px}
.nav-btn-ghost{padding:8px 16px;border-radius:9px;border:1px solid var(--bdr);
  color:var(--ink2);font-weight:700;font-size:13px;transition:.2s}
.nav-btn-ghost:hover{border-color:var(--g);color:#fff}
.nav-btn-cta{padding:8px 18px;border-radius:9px;background:var(--g);
  color:#000;font-weight:800;font-size:13px;border:none;transition:.2s}
.nav-btn-cta:hover{background:#00c07e}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;
  background:#1e2530;border:1px solid var(--bdr);color:#fff;font-weight:700;
  font-size:14px;z-index:9999;transform:translateX(120%);transition:.3s;max-width:320px}
.toast.show{transform:translateX(0)}
.toast-ok{border-color:var(--g);color:var(--g)}
.toast-err{border-color:var(--red);color:var(--red)}
.toast-warn{border-color:var(--yellow);color:var(--yellow)}

/* DASH LAYOUT */
.dash-wrap{display:flex;min-height:calc(100vh - 64px)}
.dash-side{width:220px;background:var(--bg2);border-right:1px solid var(--bdr);
  padding:20px 0;flex-shrink:0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.ds-user{padding:0 16px 16px;border-bottom:1px solid var(--bdr);margin-bottom:8px}
.ds-ava{width:44px;height:44px;border-radius:12px;background:var(--gl);border:2px solid var(--g);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px}
.ds-name{font-weight:800;font-size:14px;color:#fff}
.ds-role{font-size:11px;color:var(--g);font-weight:700;text-transform:uppercase}
.ds-item{display:flex;align-items:center;gap:10px;padding:11px 16px;margin:2px 8px;
  border-radius:10px;cursor:pointer;color:var(--ink2);font-weight:600;font-size:13px;transition:.2s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.ds-item:hover{background:var(--bg3);color:#fff}
.ds-item.active{background:var(--gl);color:var(--g);border-left:3px solid var(--g)}
.ds-ico{font-size:16px;width:20px;text-align:center}
.ds-sep{height:1px;background:var(--bdr);margin:8px 16px}
.dash-main{flex:1;padding:28px;min-width:0;overflow-y:auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.tab-title{font-size:20px;font-weight:900;margin-bottom:20px}

/* CARDS */
.mcard{display:block;background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;
  padding:18px;transition:.2s;cursor:pointer}
.mcard:hover{border-color:var(--g);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,214,143,.1)}
.mc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.mc-ava{width:48px;height:48px;border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-weight:800;font-size:15px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-loc{font-size:12px;color:var(--ink3);font-weight:600}
.mc-rate{font-size:18px;font-weight:900;color:var(--yellow);white-space:nowrap}
.mc-skills{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.msk{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;
  padding:3px 9px;font-size:11px;font-weight:700;color:var(--ink2)}
.mc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.mc-price{font-size:16px;font-weight:900;color:var(--g)}

/* ORDER CARD */
.oc{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.oc-title{font-weight:800;font-size:15px;margin-top:6px}
.oc-budget{font-size:18px;font-weight:900;color:var(--g);white-space:nowrap}
.oc-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:10px}
.oc-desc{font-size:13px;color:var(--ink2);line-height:1.6}
.oc-foot{display:flex;justify-content:flex-end;margin-top:12px}
.lock-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:8px;
  padding:10px 14px;font-size:12px;color:var(--yellow);font-weight:700;margin-top:10px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;text-align:center}
.stat-v{font-size:28px;font-weight:900;font-family:'Syne',sans-serif}
.stat-l{font-size:12px;color:var(--ink3);font-weight:700;margin-top:4px}

/* PROFILE FORM */
.pf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pf-label{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:6px}

/* ADMIN TABLE */
.adm-tbl{width:100%;border-collapse:collapse}
.adm-tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:800;
  color:var(--ink3);text-transform:uppercase;border-bottom:1px solid var(--bdr)}
.adm-tbl td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle}
.adm-tbl tr:hover td{background:var(--bg3)}
.adm-filter{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.adm-filter input,.adm-filter select{max-width:200px}

/* SECTION */
.section{padding:72px 5%}
.wrap{max-width:1140px;margin:0 auto}
.sec-h{font-size:28px;font-weight:900;margin-bottom:6px}
.sec-s{color:var(--ink3);font-size:15px;margin-bottom:32px}
.g{color:var(--g)}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.cat-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;
  padding:18px;text-align:center;transition:.2s}
.cat-card:hover{border-color:var(--g);transform:translateY(-2px)}
.cat-ico{font-size:32px;margin-bottom:8px}
.cat-nm{font-weight:800;font-size:13px;margin-bottom:4px}
.cat-n{font-size:11px;color:var(--ink3);font-weight:600}

/* FLAGS */
.flags-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.fl-chip{background:var(--bg2);border:1px solid var(--bdr);border-radius:99px;
  padding:6px 14px;font-size:13px;font-weight:600;transition:.2s}
.fl-chip:hover{border-color:var(--g)}

/* RESPONSIVE */
@media(max-width:768px){
  .dash-side{display:none}
  .pf-row{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .nav-links{display:none}
}

</style>
</head>

// Auth
const getUser=()=>{try{return JSON.parse(localStorage.getItem(AUTH_KEY));}catch{return null;}};
const setUser=u=>localStorage.setItem(AUTH_KEY,JSON.stringify(u));
const clearUser=()=>localStorage.removeItem(AUTH_KEY);

// Users
const getUsers=()=>{try{return JSON.parse(localStorage.getItem(USERS_KEY))||[];}catch{return [];}};
const saveUsers=arr=>localStorage.setItem(USERS_KEY,JSON.stringify(arr));

// Orders
const getOrders=()=>{try{return JSON.parse(localStorage.getItem(ORDERS_KEY))||DEMO_ORDERS;}catch{return DEMO_ORDERS;}};
const saveOrders=arr=>localStorage.setItem(ORDERS_KEY,JSON.stringify(arr));
const updateOrder=(id,data)=>{const os=getOrders();const i=os.findIndex(o=>o.id===id);if(i>=0){os[i]={...os[i],...data};saveOrders(os);}};

// Login
const loginUser=(email,password)=>{
  if(email==='admin@slavic-shkaf.eu'&&password==='admin2025')
    return{ok:true,user:{id:'admin',name:'Admin',role:'admin',email}};
  const u=getUsers().find(u=>u.email===email&&u.password===password);
  if(!u)return{ok:false,err:ru()?'Неверный email или пароль':'Wrong email or password'};
  if(u.blocked)return{ok:false,err:ru()?'Аккаунт заблокирован':'Account blocked'};
  return{ok:true,user:u};
};

// Register
const registerUser=data=>{
  const users=getUsers();
  if(users.find(u=>u.email===data.email))return{ok:false,err:ru()?'Email уже используется':'Email already used'};
  const u={...data,id:'u_'+Date.now(),createdAt:new Date().toISOString()};
  saveUsers([...users,u]);
  return{ok:true,user:u};
};

// Update user
const updateUser=(id,data)=>{
  const users=getUsers();
  const i=users.findIndex(u=>u.id===id);
  if(i>=0){users[i]={...users[i],...data};saveUsers(users);}
  const sess=getUser();
  if(sess&&sess.id===id)setUser({...sess,...data});
};

// Subscription check
const hasSub=u=>{
  if(!u)return false;
  if(u.sub===true)return true;
  if(u.subExpiry&&new Date(u.subExpiry)>new Date())return true;
  return false;
};

// Require auth
const requireAuth=(role)=>{
  const u=getUser();
  if(!u){location.href='login.html';return null;}
  if(role&&u.role!==role&&u.role!=='admin'){location.href='index.html';return null;}
  return u;
};

// Toast
const toast=(msg,type='ok')=>{
  const d=document.createElement('div');
  d.className='toast toast-'+type;
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(()=>d.classList.add('show'),10);
  setTimeout(()=>{d.classList.remove('show');setTimeout(()=>d.remove(),300);},3000);
};

  completed:`<span class="badge badge-b">✅ ${ru()?'Завершена':'Done'}</span>`,
  cancelled:`<span class="badge">❌ ${ru()?'Отменена':'Cancelled'}</span>`,

};

if(u) location.href = u.role==='master'?'dashboard.html':u.role==='admin'?'admin.html':'client.html';

function doLogin(){
  const em = document.getElementById('l-em').value.trim();
  const pw = document.getElementById('l-pw').value;
  if(!em||!pw){toast('Заполните все поля','err');return;}
  const res = loginUser(em, pw);
  if(!res.ok){toast(res.err,'err');return;}
  setUser(res.user);
  toast('Добро пожаловать! 🎉');
  setTimeout(()=>{
    const u=res.user;
    location.href = u.role==='master'?'dashboard.html':u.role==='admin'?'admin.html':'client.html';
  }, 800);
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
