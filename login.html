<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Вход — Slavic Shkaf</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0d1117;--bg3:#111827;
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.12);
  --g:#00d68f;--gl:rgba(0,214,143,.08);
  --acc:#7c6fff;--accl:rgba(124,111,255,.08);
  --red:#ef4444;--yellow:#fbbf24;
  --ink1:#fff;--ink2:rgba(255,255,255,.7);--ink3:rgba(255,255,255,.4);
}
body{background:var(--bg);color:var(--ink1);font-family:'Manrope',sans-serif;font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}
input,select,textarea{
  background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:10px;
  color:#fff;padding:11px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:.2s
}
input:focus,select:focus,textarea:focus{border-color:var(--g);background:rgba(0,214,143,.05)}
select option{background:#1a1f2e;color:#fff}
button{cursor:pointer;font-family:inherit}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;
  border-radius:10px;font-weight:700;font-size:14px;border:none;transition:.2s;white-space:nowrap}
.btn-p{background:var(--g);color:#000}.btn-p:hover{background:#00c07e;transform:translateY(-1px)}
.btn-o{background:transparent;border:1.5px solid var(--bdr2);color:#fff}.btn-o:hover{border-color:var(--g);color:var(--g)}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{background:#dc2626}
.btn-y{background:var(--yellow);color:#000}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
.btn-fw{width:100%}
.btn-acc{background:var(--acc);color:#fff}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:99px;font-size:11px;font-weight:800;background:rgba(255,255,255,.1)}
.badge-g{background:rgba(0,214,143,.15);color:#00d68f}
.badge-y{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-b{background:rgba(124,111,255,.15);color:#a78bfa}
.badge-r{background:rgba(239,68,68,.15);color:#ef4444}
.badge-o{background:rgba(251,146,60,.15);color:#fb923c}

/* NAV */
.nav{height:64px;display:flex;align-items:center;padding:0 20px;gap:16px;
  background:rgba(6,9,15,.97);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:200;backdrop-filter:blur(16px)}
.nav-logo img{height:52px;object-fit:contain;display:block}
.nav-links{display:flex;gap:20px;list-style:none}
.nav-links a{color:var(--ink2);font-weight:600;font-size:13px;transition:.2s;padding:4px 0}
.nav-links a:hover{color:#fff}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-btn-ghost{padding:8px 16px;border-radius:9px;border:1.5px solid var(--bdr2);
  color:var(--ink2);font-weight:700;font-size:13px;transition:.2s;display:inline-block}
.nav-btn-ghost:hover{border-color:var(--g);color:#fff}
.nav-btn-cta{padding:8px 18px;border-radius:9px;background:var(--g);
  color:#000;font-weight:800;font-size:13px;border:none;transition:.2s;display:inline-block}
.nav-btn-cta:hover{background:#00c07e}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;
  background:#1e2530;border:1px solid var(--bdr2);color:#fff;font-weight:700;
  font-size:14px;z-index:9999;transform:translateX(130%);transition:.3s;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(0)}
.toast-ok{border-color:var(--g)!important;color:var(--g)!important}
.toast-err{border-color:var(--red)!important;color:var(--red)!important}
.toast-warn{border-color:var(--yellow)!important;color:var(--yellow)!important}

/* DASHBOARD LAYOUT */
.dash-wrap{display:flex;min-height:calc(100vh - 64px)}
.dash-side{width:220px;background:var(--bg2);border-right:1px solid var(--bdr);
  padding:16px 0;flex-shrink:0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.ds-user{padding:0 14px 14px;border-bottom:1px solid var(--bdr);margin-bottom:8px;text-align:center}
.ds-ava{width:48px;height:48px;border-radius:14px;background:var(--gl);border:2px solid var(--g);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px}
.ds-name{font-weight:800;font-size:14px}
.ds-role{font-size:11px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.ds-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:2px 8px;
  border-radius:10px;cursor:pointer;color:var(--ink2);font-weight:600;font-size:13px;
  transition:.15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.ds-item:hover{background:rgba(255,255,255,.05);color:#fff}
.ds-item.active{background:var(--gl);color:var(--g);border-left:3px solid var(--g);padding-left:11px}
.ds-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.ds-sep{height:1px;background:var(--bdr);margin:8px 14px}
.dash-main{flex:1;padding:28px;min-width:0;overflow-y:auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.dash-title{font-size:20px;font-weight:900;margin-bottom:20px;font-family:'Syne',sans-serif}

/* CARDS */
.mcard{display:block;background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;
  padding:18px;transition:.2s;cursor:pointer}
.mcard:hover{border-color:var(--g);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,214,143,.08)}
.mc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.mc-ava{width:48px;height:48px;border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-weight:800;font-size:14px;margin-bottom:3px}
.mc-loc{font-size:12px;color:var(--ink3);font-weight:600}
.mc-rate{font-weight:900;color:var(--yellow);white-space:nowrap;font-size:15px}
.mc-skills{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.msk{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;
  padding:3px 8px;font-size:11px;font-weight:700;color:var(--ink2)}
.mc-foot{display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.mc-price{font-size:15px;font-weight:900;color:var(--g)}

/* ORDER CARD */
.oc{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.oc-title{font-weight:800;font-size:15px;margin-top:6px}
.oc-budget{font-size:18px;font-weight:900;color:var(--g);white-space:nowrap}
.oc-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:10px}
.oc-desc{font-size:13px;color:var(--ink2);line-height:1.6}
.oc-foot{display:flex;justify-content:flex-end;margin-top:12px;gap:8px}
.lock-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);
  border-radius:8px;padding:10px 14px;font-size:12px;color:var(--yellow);font-weight:700;margin-top:10px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:16px;text-align:center}
.stat-v{font-size:26px;font-weight:900;font-family:'Syne',sans-serif}
.stat-l{font-size:11px;color:var(--ink3);font-weight:700;margin-top:4px}

/* FORM */
.pf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pf-label{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:5px}
.form-block{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:16px}
.form-block-title{font-weight:800;font-size:15px;margin-bottom:16px}

/* ADMIN TABLE */
.adm-tbl{width:100%;border-collapse:collapse}
.adm-tbl th{padding:10px 12px;text-align:left;font-size:11px;font-weight:800;
  color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr)}
.adm-tbl td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle}
.adm-tbl tr:hover td{background:rgba(255,255,255,.02)}
.adm-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.adm-filters input{max-width:220px}
.adm-filters select{max-width:180px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--bdr2);border-radius:20px;
  padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-size:18px;font-weight:900;margin-bottom:20px;font-family:'Syne',sans-serif}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;
  color:var(--ink3);font-size:20px;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:#fff}

/* SECTIONS */
.section{padding:64px 5%}
.wrap{max-width:1140px;margin:0 auto}
.sec-h{font-size:26px;font-weight:900;font-family:'Syne',sans-serif}
.sec-s{color:var(--ink3);font-size:14px;margin-top:4px}
.slbl{font-size:11px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.g{color:var(--g)}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.cat-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;
  padding:16px;text-align:center;transition:.2s}
.cat-card:hover{border-color:var(--g);transform:translateY(-2px)}
.cat-ico{font-size:28px;margin-bottom:6px}
.cat-nm{font-weight:800;font-size:12px;margin-bottom:3px}
.cat-n{font-size:11px;color:var(--ink3);font-weight:600}

/* FLAGS */
.flags-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.fl-chip{background:var(--bg2);border:1px solid var(--bdr);border-radius:99px;
  padding:6px 14px;font-size:13px;font-weight:600;transition:.2s;white-space:nowrap}
.fl-chip:hover{border-color:var(--g);color:var(--g)}

/* MOBILE TAB BAR */
.mob-tabbar{display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,17,23,.97);border-top:1px solid var(--bdr);
  z-index:300;backdrop-filter:blur(16px)}
.mob-tabbar-inner{display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;
  border:none;background:none;color:var(--ink3);font-size:10px;font-weight:700;
  cursor:pointer;transition:.2s;border-radius:10px;min-width:56px}
.mob-tab .mt-ico{font-size:20px;line-height:1}
.mob-tab.active{color:var(--g)}
.mob-tab.active .mt-ico{filter:drop-shadow(0 0 8px rgba(0,214,143,.5))}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-links{display:none}
  .dash-side{display:none}
  .dash-main{padding:16px;padding-bottom:80px}
  .pf-row{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .mob-tabbar{display:block}
  .adm-filters input,.adm-filters select{max-width:100%}
  .section{padding:40px 4%}
  .modal{padding:20px;max-height:85vh}
  .adm-tbl{font-size:12px}
  .adm-tbl th,.adm-tbl td{padding:8px 8px}
}
/* TG WebApp */
@media(max-width:480px){
  .nav{padding:0 12px;height:56px}
  .nav-logo img{height:42px}
  .dash-main{padding:12px;padding-bottom:80px}
  .mcard{padding:14px}
  .mc-ava{width:40px;height:40px;font-size:20px}
  .oc{padding:14px}
  .stat-v{font-size:22px}
}
</style>
</head>

const catIco=id=>SK.find(s=>s.id===id)?.i||'🔨';
const catName=id=>SK.find(s=>s.id===id)?.ru||id;
const getUser=()=>{try{return JSON.parse(localStorage.getItem(AUTH_KEY));}catch{return null;}};
const setUser=u=>localStorage.setItem(AUTH_KEY,JSON.stringify(u));
const clearUser=()=>localStorage.removeItem(AUTH_KEY);
const getUsers=()=>{try{return JSON.parse(localStorage.getItem(USERS_KEY))||[];}catch{return[];}};
const saveUsers=arr=>localStorage.setItem(USERS_KEY,JSON.stringify(arr));
const getOrders=()=>{try{return JSON.parse(localStorage.getItem(ORDERS_KEY))||DEMO_ORDERS;}catch{return DEMO_ORDERS;}};
const saveOrders=arr=>localStorage.setItem(ORDERS_KEY,JSON.stringify(arr));
const updateOrder=(id,data)=>{const os=getOrders();const i=os.findIndex(o=>o.id===id);if(i>=0){os[i]={...os[i],...data};saveOrders(os);}};
const updateUser=(id,data)=>{
  const us=getUsers();const i=us.findIndex(u=>u.id===id);
  if(i>=0){us[i]={...us[i],...data};saveUsers(us);}
  const s=getUser();if(s&&s.id===id)setUser({...s,...data});
};
const registerUser=data=>{
  const us=getUsers();
  if(us.find(u=>u.email===data.email))return{ok:false,err:'Email уже используется'};
  const u={...data,id:'u_'+Date.now(),createdAt:new Date().toISOString()};
  saveUsers([...us,u]);return{ok:true,user:u};
};
const loginUser=(email,pw)=>{
  if(email==='admin@slavic-shkaf.eu'&&pw==='admin2025')
    return{ok:true,user:{id:'admin',name:'Admin',role:'admin',email}};
  const u=getUsers().find(u=>u.email===email&&u.password===pw);
  if(!u)return{ok:false,err:'Неверный email или пароль'};
  if(u.blocked)return{ok:false,err:'Аккаунт заблокирован'};
  return{ok:true,user:u};
};
const hasSub=u=>!!(u&&(u.sub||(u.subExpiry&&new Date(u.subExpiry)>new Date())));
const statusBadge=s=>({
  open:`<span class="badge badge-g">🟢 Открыта</span>`,
  in_progress:`<span class="badge badge-y">🔄 В работе</span>`,
  completed:`<span class="badge badge-b">✅ Завершена</span>`,
  cancelled:`<span class="badge badge-r">❌ Отменена</span>`,
}[s]||`<span class="badge">${s}</span>`);

const toast=(msg,type='ok')=>{
  let el=document.getElementById('__toast');
  if(!el){el=document.createElement('div');el.id='__toast';el.className='toast';document.body.appendChild(el);}
  el.textContent=msg;el.className='toast toast-'+type;
  setTimeout(()=>el.classList.add('show'),10);
  clearTimeout(el._t);el._t=setTimeout(()=>{el.classList.remove('show');},3000);
};

const renderNav=(opts={})=>{
  const u=getUser();
  const nr=document.getElementById('nav-r');
  if(!nr)return;
  if(u){
    const dash=u.role==='master'?'dashboard.html':u.role==='admin'?'admin.html':'client.html';
    nr.innerHTML=`<a href="${dash}" class="nav-btn-ghost" style="font-size:12px">👤 ${u.name}</a>
      <button class="nav-btn-cta" onclick="clearUser();location.href='index.html'" style="font-size:12px">Выйти</button>`;
  }else{
    nr.innerHTML=`<a href="login.html" class="nav-btn-ghost">Войти</a>
      <a href="register.html" class="nav-btn-cta">Регистрация</a>`;
  }
};


const u=getUser();if(u)location.href=u.role==='master'?'dashboard.html':u.role==='admin'?'admin.html':'client.html';
function doLogin(){
  const em=document.getElementById('l-em').value.trim(),pw=document.getElementById('l-pw').value;
  if(!em||!pw){toast('Заполните все поля','err');return;}
  const res=loginUser(em,pw);
  if(!res.ok){toast(res.err,'err');return;}
  setUser(res.user);toast('Добро пожаловать! 🎉');
  setTimeout(()=>location.href=res.user.role==='master'?'dashboard.html':res.user.role==='admin'?'admin.html':'client.html',700);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
renderNav();</script>
