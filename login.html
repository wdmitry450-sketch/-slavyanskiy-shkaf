<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slavic Shkaf — Вход</title>
<link rel="stylesheet" href="styles.css">
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 20px 40px;background:var(--bg);position:relative;overflow:hidden}
.auth-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 40%,rgba(0,214,143,.06),transparent 65%),radial-gradient(ellipse 50% 40% at 70% 60%,rgba(124,111,255,.06),transparent 65%)}
.auth-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:24px;padding:40px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo img{height:52px;width:auto;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.auth-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.auth-sub{font-size:13px;color:var(--ink3);text-align:center;margin-bottom:28px;font-weight:500}
.lang-row{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.lang-pill{padding:5px 14px;border-radius:50px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--ink3);transition:.15s}
.lang-pill.on{background:var(--gl);border-color:var(--g);color:var(--g)}
.auth-foot{text-align:center;margin-top:20px;font-size:13px;color:var(--ink3);font-weight:500}
.auth-foot a{color:var(--g);font-weight:700}
.auth-foot a:hover{color:#fff}
.forgot-link{display:block;text-align:right;font-size:12px;color:var(--ink3);font-weight:600;margin-top:-8px;margin-bottom:14px;transition:.15s}
.forgot-link:hover{color:var(--g)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><a href="index.html"><img src="logo.png" alt="Slavic Shkaf"></a></div>

    <div class="lang-row">
      <button class="lang-pill" id="lp-ru" onclick="switchLang('ru')">🇷🇺 Русский</button>
      <button class="lang-pill" id="lp-en" onclick="switchLang('en')">🇬🇧 English</button>
    </div>

    <div id="auth-title" class="auth-title"></div>
    <div id="auth-sub"   class="auth-sub"></div>

    <div class="fg"><label class="fl" id="l-email"></label>
      <input class="fi" type="email" id="inp-email" autocomplete="email"></div>
    <div class="fg"><label class="fl" id="l-pass"></label>
      <input class="fi" type="password" id="inp-pass" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()"></div>
    <a href="forgot.html" class="forgot-link" id="l-forgot"></a>

    <button class="btn btn-p btn-fw" id="btn-login" onclick="doLogin()"></button>

    <div class="or-div" id="l-or"></div>
    <a href="https://t.me/slavyanskiy_shkaf_bot?start=login" target="_blank"
       class="btn btn-tg btn-fw" style="display:flex">✈️ Telegram</a>

    <div class="auth-foot" id="foot-reg"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
// ── Redirect if already logged in ─────────────────────────
const _u = getUser();
if (_u) location.href = _u.role==='master' ? 'dashboard.html' : _u.role==='admin' ? 'admin.html' : 'client.html';

function render() {
  document.getElementById('auth-title').textContent = t('login');
  document.getElementById('auth-sub').textContent   = LANG==='ru' ? 'Рады видеть вас снова' : 'Welcome back';
  document.getElementById('l-email').textContent    = t('email');
  document.getElementById('l-pass').textContent     = t('password');
  document.getElementById('l-forgot').textContent   = t('forgotPassword');
  document.getElementById('btn-login').textContent  = t('login');
  document.getElementById('l-or').textContent       = t('or');
  document.getElementById('inp-email').placeholder  = 'you@example.com';
  document.getElementById('inp-pass').placeholder   = LANG==='ru' ? 'Введите пароль' : 'Enter password';
  document.getElementById('foot-reg').innerHTML =
    (LANG==='ru' ? 'Нет аккаунта? ' : "Don't have an account? ") +
    `<a href="register.html">${t('register')}</a>`;
  document.getElementById('lp-ru').classList.toggle('on', LANG==='ru');
  document.getElementById('lp-en').classList.toggle('on', LANG==='en');
  document.title = `Slavic Shkaf — ${t('login')}`;
}

function switchLang(l) { LANG=l; localStorage.setItem('shkaf_lang',l); render(); }

function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  if (!email || !pass) { toast(LANG==='ru'?'Заполните все поля':'Fill in all fields','err'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled=true; btn.textContent=t('loading');
  setTimeout(() => {
    const res = loginUser(email, pass);
    if (!res.ok) { toast(res.err,'err'); btn.disabled=false; btn.textContent=t('login'); return; }
    setUser(res.user);
    toast(LANG==='ru'?`Добро пожаловать, ${res.user.name}! 👋`:`Welcome, ${res.user.name}! 👋`);
    setTimeout(() => {
      const r = res.user.role;
      location.href = r==='master' ? 'dashboard.html' : r==='admin' ? 'admin.html' : 'client.html';
    }, 700);
  }, 800);
}

render();
</script>
</body>
</html>
